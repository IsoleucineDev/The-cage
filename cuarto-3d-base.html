<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>el cuarto</title>
</head>
<body style="margin:0;">
<div id="app-root"></div>
<style>
  :root{ --void:#050506; --fg:#8f8f96; --fg-dim:#4a4a50; --accent:#c9c9cf; }
  *{box-sizing:border-box; margin:0; padding:0;}
  #app-root{
    background:var(--void); color:var(--fg);
    font-family:'SF Mono','Fira Code',Menlo,Consolas,monospace;
    width:100%; height:100vh; position:relative; overflow:hidden;
  }
  #sceneCanvas{ display:block; width:100%; height:100%; }
  .hud{
    position:absolute; top:14px; left:16px; font-size:11px; color:var(--fg-dim);
    letter-spacing:.03em; pointer-events:none; line-height:1.8; z-index:5;
  }
  .hud b{ color:var(--accent); }
  #startOverlay{
    position:absolute; inset:0; background:rgba(5,5,6,0.94);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:20px; z-index:50;
  }
  #startOverlay h1{ font-size:14px; color:var(--accent); font-weight:500; margin-bottom:10px; letter-spacing:.03em; }
  #startOverlay p{ font-size:11.5px; color:var(--fg-dim); max-width:440px; line-height:1.7; margin-bottom:14px; }
  #startOverlay .warning{ color:#a08a8a; border:1px solid #3a2a2a; padding:10px 14px; margin-bottom:20px; max-width:440px; }
  #startOverlay button{
    background:#1c1c1f; color:var(--fg); border:1px solid #2a2a2e;
    padding:10px 20px; font-family:inherit; font-size:12px; cursor:pointer; letter-spacing:.02em;
  }
  #startOverlay button:hover{ color:var(--accent); border-color:#3a3a3e; }
  .controls-hint{ font-size:10px; color:var(--fg-dim); margin-top:14px; letter-spacing:.02em; }

  #interactPrompt{
    position:absolute; bottom:14%; left:50%; transform:translateX(-50%);
    font-size:11px; color:var(--accent); background:rgba(10,10,12,0.6);
    padding:6px 12px; border:1px solid #2a2a2e; letter-spacing:.03em;
    display:none; z-index:6; pointer-events:none;
  }

  .monologue{
    position:absolute; bottom:20%; left:50%; transform:translateX(-50%);
    font-size:12.5px; color:var(--accent); text-align:center; max-width:70%;
    opacity:0; transition:opacity 1.4s ease; z-index:7; pointer-events:none; letter-spacing:.02em;
  }
  .monologue.show{ opacity:0.9; }

  #fadeLayer{
    position:absolute; inset:0; background:#000; opacity:0; pointer-events:none; z-index:20;
    transition:opacity 1.1s ease;
  }
  #fadeLayer.white{ background:#e8e8ea; }
  #fadeLayer.show{ opacity:1; }

  /* ---------- bathroom choice panel ---------- */
  #bathroomPanel, #windowPanel{
    position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(5,5,6,0.85); z-index:30; flex-direction:column; gap:10px;
  }
  #bathroomPanel.open, #windowPanel.open{ display:flex; }
  #bathroomPanel button, #windowPanel button{
    background:#1c1c1f; color:var(--fg); border:1px solid #2a2a2e;
    padding:10px 18px; font-family:inherit; font-size:12px; cursor:pointer; width:260px;
  }
  #bathroomPanel button:hover, #windowPanel button:hover{ color:var(--accent); border-color:#3a3a3e; }
  #bathroomPanel p, #windowPanel p{ font-size:11px; color:var(--fg-dim); margin-bottom:6px; max-width:320px; text-align:center; }

  /* ---------- webcam reflection (fase disolución) ---------- */
  #reflection{
    position:absolute; bottom:24px; right:24px; width:150px; height:112px;
    border:1px solid #3a3a3e; overflow:hidden; z-index:8; display:none;
    background:#000;
  }
  #reflection.on{ display:block; }
  #reflection video{
    width:100%; height:100%; object-fit:cover; transform:scaleX(-1);
    filter: contrast(1.3) saturate(0.4) hue-rotate(0deg);
    animation: glitchShift 0.6s infinite steps(2);
  }
  @keyframes glitchShift{
    0%{ filter:contrast(1.3) saturate(0.4) hue-rotate(0deg) brightness(1); transform:scaleX(-1) translateX(0); }
    30%{ filter:contrast(1.6) saturate(0.2) hue-rotate(30deg) brightness(1.2); transform:scaleX(-1) translateX(-2px); }
    55%{ filter:contrast(1.1) saturate(0.6) hue-rotate(-20deg) brightness(0.8); transform:scaleX(-1) translateX(2px); }
    80%{ filter:contrast(1.8) saturate(0.1) hue-rotate(60deg) brightness(1.4); transform:scaleX(-1) translateX(0); }
    100%{ filter:contrast(1.3) saturate(0.4) hue-rotate(0deg) brightness(1); transform:scaleX(-1) translateX(0); }
  }

  /* ---------- PC overlay (pantalla completa) ---------- */
  #pcOverlay{
    position:absolute; inset:0; background:#08080a; z-index:40; display:none;
    flex-direction:column;
  }
  #pcOverlay.open{ display:flex; }
  #pcTabs{ display:flex; border-bottom:1px solid #2a2a2e; }
  #pcTabs button{
    flex:1; background:#0e0e10; color:var(--fg-dim); border:none; border-right:1px solid #2a2a2e;
    padding:12px 8px; font-family:inherit; font-size:11px; cursor:pointer; letter-spacing:.03em;
  }
  #pcTabs button.active{ color:var(--accent); background:#151517; }
  #pcContent{ flex:1; overflow:auto; padding:20px; }
  #pcClose{
    position:absolute; top:10px; right:14px; background:none; border:none; color:var(--fg-dim);
    font-family:inherit; font-size:16px; cursor:pointer; z-index:41;
  }
  #pcClose:hover{ color:var(--accent); }

  /* twt */
  .twt-box{ max-width:360px; margin:0 auto; }
  .twt-box textarea{
    width:100%; background:#111113; color:var(--fg); border:1px solid #2a2a2e;
    font-family:inherit; font-size:12px; padding:10px; resize:none;
  }
  .twt-box button{
    margin-top:8px; background:#1c1c1f; color:var(--fg); border:1px solid #2a2a2e;
    padding:8px 16px; font-family:inherit; font-size:11px; cursor:pointer;
  }
  .twt-feed{ margin-top:16px; font-size:11px; color:var(--fg-dim); }

  /* foro */
  .foro-list{ max-width:520px; margin:0 auto; }
  .foro-thread{
    padding:10px 12px; border:1px solid #222225; margin-bottom:8px; cursor:pointer; font-size:12px;
  }
  .foro-thread:hover{ border-color:#3a3a3e; color:var(--accent); }
  .foro-body{ max-width:520px; margin:14px auto; font-size:11.5px; color:var(--fg-dim); line-height:1.7; }
  .foro-body button{
    margin-top:10px; background:#1c1c1f; color:#a08a8a; border:1px solid #3a2a2a;
    padding:6px 14px; font-family:inherit; font-size:10.5px; cursor:pointer;
  }

  /* rpg */
  .rpg-box{ max-width:440px; margin:0 auto; text-align:center; }
  .rpg-npc{
    width:60px; height:60px; background:#28282c; margin:0 auto 14px; border:1px solid #3a3a3e;
  }
  .rpg-dialogue{
    border:1px solid #2a2a2e; padding:14px; font-size:12px; min-height:50px; margin-bottom:12px;
  }
  .rpg-box button{
    background:#1c1c1f; color:var(--fg); border:1px solid #2a2a2e; padding:8px 16px;
    font-family:inherit; font-size:11px; cursor:pointer;
  }

  /* plataformas */
  #platCanvas{ display:block; margin:0 auto; background:#0c0c0e; border:1px solid #2a2a2e; }
  .plat-hint{ text-align:center; font-size:10.5px; color:var(--fg-dim); margin-top:10px; }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  const root = document.getElementById('app-root');
  root.innerHTML = `
    <canvas id="sceneCanvas"></canvas>
    <div class="hud">fase: <b id="phaseLabel">día 1</b></div>
    <div id="interactPrompt"></div>
    <div class="monologue" id="monologue"></div>
    <div id="fadeLayer"></div>
    <div id="reflection"><video id="reflectVideo" autoplay muted playsinline></video></div>

    <div id="bathroomPanel">
      <p>&gt; baño</p>
      <button id="btnBrush">cepillarte los dientes</button>
      <button id="btnPills">tomar pastillas</button>
      <button id="btnBathClose">salir</button>
    </div>

    <div id="windowPanel">
      <p>&gt; la ventana</p>
      <button id="btnBreakWindow">romperla</button>
      <button id="btnWinClose">alejarte</button>
    </div>

    <div id="pcOverlay">
      <button id="pcClose">&times; cerrar</button>
      <div id="pcTabs">
        <button data-tab="plataformas" class="active">plataformas</button>
        <button data-tab="rpg">rpg</button>
        <button data-tab="twt">twt</button>
        <button data-tab="foro">foro</button>
      </div>
      <div id="pcContent"></div>
    </div>

    <div id="startOverlay">
      <h1>&gt; el cuarto</h1>
      <p>Cama, escritorio, monitor, puerta. Cruzar la puerta no te saca de aquí — te regresa al mismo cuarto, un poco menos sólido que antes. WASD para caminar, mouse para mirar, E para interactuar.</p>
      <div class="warning">Esta obra aborda temas de aislamiento, salud mental y pensamientos suicidas de forma simbólica y no explícita. Si estás pasando por algo similar, no estás solo/a — Línea de la Vida: 800 911 2000. Más adelante en la experiencia se solicitará acceso a tu cámara.</div>
      <button id="enterBtn">▶ entrar</button>
      <div class="controls-hint">WASD mover · mouse mirar · E interactuar · ESC soltar cursor</div>
    </div>
  `;

  const canvas = document.getElementById('sceneCanvas');
  const enterBtn = document.getElementById('enterBtn');
  const startOverlay = document.getElementById('startOverlay');
  const phaseLabel = document.getElementById('phaseLabel');
  const interactPrompt = document.getElementById('interactPrompt');
  const monologueEl = document.getElementById('monologue');
  const fadeLayer = document.getElementById('fadeLayer');

  // ============================================================
  // AUDIO — archivos reales de Musica/ y Musica/Foleys/
  // ============================================================
  const AUDIO = {};
  const AUDIO_PATHS = {
    habitacion: 'Musica/habitacion.wav',
    computadora: 'Musica/computadora.wav',
    bano:        'Musica/baño.wav',
    salida:      'Musica/salida.wav',
    dormir:      'Musica/dormir.wav',
    pensamientos:'Musica/pensamientos.wav',
    caida:       'Musica/Foleys/caida.wav',
    pasos1:      'Musica/Foleys/pasos op 1.wav',
    pasos2:      'Musica/Foleys/pasos op 2.wav',
    teclado:     'Musica/Foleys/teclado.wav',
    ventana:     'Musica/Foleys/ventasna.wav',
  };

  function initAudioElements(){
    for(const [k, path] of Object.entries(AUDIO_PATHS)){
      AUDIO[k] = new Audio(path);
    }
    AUDIO.habitacion.loop   = true;
    AUDIO.habitacion.volume = 0.5;
    AUDIO.pensamientos.loop = true;
  }

  let currentAmbient = null;
  function stopAmbient(){
    if(currentAmbient){ currentAmbient.pause(); currentAmbient.currentTime = 0; currentAmbient = null; }
  }
  function playOne(name, volume=1.0){
    const a = AUDIO[name];
    if(!a) return;
    a.volume = volume;
    a.currentTime = 0;
    a.play().catch(()=>{});
  }

  // tono sintetizado solo para notificacion (sin archivo)
  let actx = null;
  function ac(){ if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)(); return actx; }
  function tone(freq, dur, type='sine', gain=0.06, delay=0){
    const c = ac();
    const t0 = c.currentTime + delay;
    const osc = c.createOscillator();
    const g = c.createGain();
    osc.type = type; osc.frequency.value = freq;
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(gain, t0+0.05);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    osc.connect(g); g.connect(c.destination);
    osc.start(t0); osc.stop(t0+dur+0.05);
  }

  let pasosToggle = false;
  const SFX = {
    habitacion(){
      stopAmbient();
      currentAmbient = AUDIO.habitacion;
      currentAmbient.play().catch(()=>{});
    },
    computadora(){ playOne('computadora', 0.7); },
    bano(){        playOne('bano', 0.8); },
    salida(){      playOne('salida', 0.9); },
    dormir(){      playOne('dormir', 0.8); },
    ventanaRota(){ playOne('ventana', 1.0); },
    pensamientos(intensity){
      stopAmbient();
      AUDIO.pensamientos.volume = Math.min(1.0, 0.3 + (intensity||0) * 0.12);
      currentAmbient = AUDIO.pensamientos;
      currentAmbient.currentTime = 0;
      currentAmbient.play().catch(()=>{});
    },
    caida(){ playOne('caida', 1.0); },
    pasos(){
      pasosToggle = !pasosToggle;
      playOne(pasosToggle ? 'pasos1' : 'pasos2', 0.5);
    },
    teclado(){     playOne('teclado', 0.35); },
    notificacion(){ tone(900, 0.15, 'sine', 0.03); },
  };

  // ============================================================
  // Three.js setup (base de Yael, sin cambios estructurales)
  // ============================================================
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x050506);
  scene.fog = new THREE.Fog(0x050506, 4, 13);

  const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.05, 100);
  camera.position.set(0, 1.6, 1.4);

  const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  window.addEventListener('resize', ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  const ROOM = { w: 5, d: 5, h: 2.6 };

  const wallMat = new THREE.MeshStandardMaterial({ color: 0x1c1c1f, roughness: 1, flatShading:true });
  const floorMat = new THREE.MeshStandardMaterial({ color: 0x131315, roughness: 1, flatShading:true });
  const ceilMat  = new THREE.MeshStandardMaterial({ color: 0x0c0c0d, roughness: 1, flatShading:true });
  const furnMat  = new THREE.MeshStandardMaterial({ color: 0x28282c, roughness: 1, flatShading:true });
  const doorMat  = new THREE.MeshStandardMaterial({ color: 0x3a3a3e, roughness: 0.8, flatShading:true, emissive:0x1a1a1e, emissiveIntensity:0.3 });
  const monitorScreenMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0c, roughness:0.4, emissive:0x1a2430, emissiveIntensity:0.4 });
  const sinkMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1e, roughness:0.6, flatShading:true });

  const room = new THREE.Group();
  scene.add(room);

  function box(w,h,d, mat, x,y,z){
    const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
    m.position.set(x,y,z);
    room.add(m);
    return m;
  }

  box(ROOM.w, 0.1, ROOM.d, floorMat, 0, 0, 0);
  box(ROOM.w, 0.1, ROOM.d, ceilMat, 0, ROOM.h, 0);
  box(ROOM.w, ROOM.h, 0.1, wallMat, 0, ROOM.h/2, -ROOM.d/2);
  box(0.1, ROOM.h, ROOM.d, wallMat, -ROOM.w/2, ROOM.h/2, 0);
  box(0.1, ROOM.h, ROOM.d, wallMat, ROOM.w/2, ROOM.h/2, 0);
  box(1.6, ROOM.h, 0.1, wallMat, -1.7, ROOM.h/2, ROOM.d/2);
  box(1.6, ROOM.h, 0.1, wallMat, 1.7, ROOM.h/2, ROOM.d/2);
  box(1.8, 0.6, 0.1, wallMat, 0, ROOM.h-0.3, ROOM.d/2);

  const door = box(1.8, 2.0, 0.12, doorMat, 0, 1.0, ROOM.d/2 - 0.02);

  // cama
  box(1.6, 0.35, 0.9, furnMat, 1.5, 0.175, -1.6);
  box(1.6, 0.15, 0.15, furnMat, 1.5, 0.42, -2.0);

  // escritorio
  box(1.1, 0.06, 0.55, furnMat, -1.4, 0.75, -1.9);
  box(0.06, 0.75, 0.06, furnMat, -1.9, 0.375, -2.1);
  box(0.06, 0.75, 0.06, furnMat, -0.9, 0.375, -2.1);

  const monitor = box(0.5, 0.32, 0.03, monitorScreenMat, -1.4, 1.05, -2.13);
  box(0.06, 0.15, 0.06, furnMat, -1.4, 0.85, -2.13);

  box(0.4, 0.05, 0.4, furnMat, -1.4, 0.45, -1.55);
  box(0.4, 0.5, 0.05, furnMat, -1.4, 0.7, -1.75);

  // lavabo (zona de baño, esquina)
  box(0.5, 0.5, 0.4, sinkMat, 1.9, 0.25, 1.8);

  // ventana con cortina
  const windowFrameMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0c, roughness:1, flatShading:true });
  box(1.0, 1.1, 0.08, windowFrameMat, 0.15, 1.55, -2.46);
  const glassMat = new THREE.MeshStandardMaterial({ color: 0x0d1520, roughness:0.3, emissive:0x0a1420, emissiveIntensity:0.15 });
  const windowGlass = box(0.9, 1.0, 0.02, glassMat, 0.15, 1.55, -2.43);
  const curtainMat = new THREE.MeshStandardMaterial({ color: 0x151518, roughness:1, flatShading:true });
  box(0.42, 1.05, 0.05, curtainMat, -0.16, 1.55, -2.38);
  box(0.40, 1.05, 0.05, curtainMat, 0.52, 1.55, -2.38);
  const moonSliverMat = new THREE.MeshStandardMaterial({ color: 0xcdd8e8, roughness:0.2, emissive:0xaebfd9, emissiveIntensity:1.1 });
  box(0.05, 1.0, 0.03, moonSliverMat, 0.16, 1.55, -2.40);

  const moonLight = new THREE.SpotLight(0xaebfd9, 0.45, 4.5, Math.PI/16, 0.6, 1.5);
  moonLight.position.set(0.16, 1.55, -2.4);
  moonLight.target.position.set(0.3, 0, -1.0);
  scene.add(moonLight); scene.add(moonLight.target);

  const ambient = new THREE.AmbientLight(0x2a2a32, 1.1); scene.add(ambient);
  const hemi = new THREE.HemisphereLight(0x2c3440, 0x0a0a0c, 0.5); scene.add(hemi);
  const monitorLight = new THREE.PointLight(0x4a7ba6, 0.8, 3.5);
  monitorLight.position.set(-1.4, 1.05, -1.9);
  scene.add(monitorLight);

  // ---------- controles ----------
  let yaw = 0, pitch = 0;
  const keys = {};
  const PLAYER_SPEED = 2.4;
  const BOUND = { x: ROOM.w/2 - 0.35, z: ROOM.d/2 - 0.35 };

  let pointerLocked = false;
  enterBtn.addEventListener('click', ()=>{
    startOverlay.style.display = 'none';
    initAudioElements();
    canvas.requestPointerLock();
    SFX.habitacion();
  });
  document.addEventListener('pointerlockchange', ()=>{
    pointerLocked = document.pointerLockElement === canvas;
  });
  document.addEventListener('mousemove', (e)=>{
    if(!pointerLocked) return;
    yaw -= e.movementX * 0.0022;
    pitch -= e.movementY * 0.0022;
    pitch = Math.max(-1.2, Math.min(1.2, pitch));
  });
  canvas.addEventListener('click', ()=>{ if(!pointerLocked && !anyPanelOpen()) canvas.requestPointerLock(); });
  window.addEventListener('keydown', e=>{
    keys[e.key.toLowerCase()]=true;
    if(e.key.toLowerCase()==='e') tryInteract();
  });
  window.addEventListener('keyup', e=>{ keys[e.key.toLowerCase()]=false; });

  function anyPanelOpen(){
    return document.getElementById('pcOverlay').classList.contains('open') ||
           document.getElementById('bathroomPanel').classList.contains('open') ||
           document.getElementById('windowPanel').classList.contains('open');
  }

  // ============================================================
  // ESTADO NARRATIVO
  // ============================================================
  const PHASES = ['día 1','semana','mes','año','disolución'];
  let phaseIndex = 0;
  let selfcare = 0; // stat oculto, nunca mostrado en UI
  let forumCommented = false;
  let degradation = 0;

  function applyDegradation(){
    const t = degradation;
    const dim = 1 - t*0.55;
    furnMat.color.setRGB(0.157*dim, 0.157*dim, 0.172*dim);
    wallMat.color.setRGB(0.11*dim, 0.11*dim, 0.12*dim);
    monitorScreenMat.emissiveIntensity = 0.4 * (1 - t*0.6);
    monitorLight.intensity = 0.8 * (1 - t*0.5);
    scene.fog.near = 4 - t*1.5;
    scene.fog.far = 13 - t*4;
    room.children.forEach(mesh=>{
      if(mesh === door) return;
      if(!mesh.userData.basePos) mesh.userData.basePos = mesh.position.clone();
      const jitter = t * 0.015;
      mesh.position.x = mesh.userData.basePos.x + (Math.random()-0.5)*jitter;
      mesh.position.y = mesh.userData.basePos.y + (Math.random()-0.5)*jitter;
    });
  }

  function showMonologue(text, ms=3200){
    monologueEl.textContent = text;
    monologueEl.classList.add('show');
    setTimeout(()=> monologueEl.classList.remove('show'), ms);
  }

  const MONOLOGUES = [
    "Suspiras por cualquier cosa. Crees que así será siempre.",
    "No es que ya no salgas. Es que ya olvidaste cómo.",
    "Nadie te ve. Es más fácil así."
  ];

  function advancePhase(){
    if(phaseIndex >= PHASES.length - 1) return; // ya en disolución
    phaseIndex++;
    degradation = Math.min(degradation + 0.22, 0.9);
    // el stat de autocuidado modula la severidad de la degradación
    if(selfcare > 2) degradation = Math.max(0, degradation - 0.08);
    applyDegradation();
    phaseLabel.textContent = PHASES[phaseIndex];
    SFX.dormir();
    doHardCutBlack(()=>{
      camera.position.set(0, 1.6, 1.4);
      yaw = 0; pitch = 0;
      if(phaseIndex < MONOLOGUES.length) showMonologue(MONOLOGUES[phaseIndex-1] || MONOLOGUES[0]);
      if(phaseIndex === PHASES.length - 1){
        enterDisolucion();
      }
    });
  }

  function doHardCutBlack(after, colorClass=''){
    fadeLayer.className = colorClass;
    fadeLayer.classList.add('show');
    setTimeout(()=>{
      if(after) after();
      setTimeout(()=> fadeLayer.classList.remove('show'), 250);
    }, 650);
  }

  // ---------- fase de disolución: activar cámara ----------
  let webcamActive = false;
  function enterDisolucion(){
    phaseLabel.textContent = 'disolución';
    const reflection = document.getElementById('reflection');
    const video = document.getElementById('reflectVideo');
    if(navigator.mediaDevices && navigator.mediaDevices.getUserMedia){
      navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream=>{
          video.srcObject = stream;
          reflection.classList.add('on');
          webcamActive = true;
        })
        .catch(()=>{ /* si no hay permiso, la obra continúa sin el reflejo */ });
    }
    SFX.pensamientos(selfcare < 0 ? 3 : 0);
    // en disolución aparece la ventana como hotspot interactuable
  }

  // ============================================================
  // FINALES
  // ============================================================
  let endingTriggered = false;

  function endingSuicidio(){
    if(endingTriggered) return; endingTriggered = true;
    SFX.pensamientos(4);
    setTimeout(()=> SFX.caida(), 600);
    doHardCutBlack(()=>{
      showMonologue("No pasó nada. Sigues aquí.", 4200);
      setTimeout(()=>{
        // regreso al mismo cuarto — el bucle continúa, sin más avance
        camera.position.set(0, 1.6, 1.4);
      }, 400);
    });
  }

  function endingDormirSiempre(){
    if(endingTriggered) return; endingTriggered = true;
    SFX.dormir();
    monologueEl.textContent = "Ya no hace falta despertar.";
    monologueEl.classList.add('show');
    fadeLayer.classList.add('show'); // fade lento, sin corte duro
    fadeLayer.style.transition = 'opacity 5s ease';
  }

  function endingSalida(){
    if(endingTriggered) return; endingTriggered = true;
    SFX.pasos(); SFX.salida();
    doHardCutBlack(()=>{
      showMonologue("Sales. No sabes a dónde, pero sales.", 5000);
    }, 'white');
  }

  function checkSalidaEligible(){
    return selfcare >= 3 && !forumCommented;
  }

  // ============================================================
  // HOTSPOTS DE INTERACCIÓN
  // ============================================================
  const HOTSPOTS = [
    { name:'pc', x:-1.4, z:-1.9, r:1.0, label:'[E] usar la computadora' },
    { name:'bed', x:1.5, z:-1.6, r:1.0, label:'[E] dormir' },
    { name:'bath', x:1.9, z:1.8, r:1.0, label:'[E] baño' },
  ];
  let currentHotspot = null;

  function updateHotspot(){
    if(anyPanelOpen()){ interactPrompt.style.display='none'; currentHotspot=null; return; }
    let nearest = null, nearestDist = Infinity;
    for(const h of HOTSPOTS){
      const dx = camera.position.x - h.x, dz = camera.position.z - h.z;
      const dist = Math.hypot(dx,dz);
      if(dist < h.r && dist < nearestDist){ nearest = h; nearestDist = dist; }
    }
    // ventana solo aparece como hotspot en disolución
    if(phaseIndex === PHASES.length-1){
      const dx = camera.position.x - 0.15, dz = camera.position.z - (-2.4);
      const dist = Math.hypot(dx,dz);
      if(dist < 1.1 && dist < nearestDist){ nearest = { name:'window', label:'[E] la ventana' }; nearestDist = dist; }
    }
    currentHotspot = nearest;
    if(nearest){ interactPrompt.textContent = nearest.label; interactPrompt.style.display='block'; }
    else interactPrompt.style.display='none';
  }

  function tryInteract(){
    if(anyPanelOpen() || !currentHotspot) return;
    if(currentHotspot.name === 'pc') openPC();
    if(currentHotspot.name === 'bed') onBed();
    if(currentHotspot.name === 'bath') openBathroom();
    if(currentHotspot.name === 'window') openWindowPanel();
  }

  function onBed(){
    if(phaseIndex === PHASES.length - 1){
      endingDormirSiempre();
    } else {
      advancePhase();
    }
  }

  // ---------- baño ----------
  const bathroomPanel = document.getElementById('bathroomPanel');
  function openBathroom(){
    bathroomPanel.classList.add('open');
    document.exitPointerLock();
  }
  document.getElementById('btnBrush').addEventListener('click', ()=>{
    selfcare += 1; SFX.bano();
    bathroomPanel.classList.remove('open'); canvas.requestPointerLock();
  });
  document.getElementById('btnPills').addEventListener('click', ()=>{
    selfcare += 2; SFX.bano();
    bathroomPanel.classList.remove('open'); canvas.requestPointerLock();
  });
  document.getElementById('btnBathClose').addEventListener('click', ()=>{
    bathroomPanel.classList.remove('open'); canvas.requestPointerLock();
  });

  // ---------- ventana (solo disolución) ----------
  const windowPanel = document.getElementById('windowPanel');
  function openWindowPanel(){
    windowPanel.classList.add('open');
    document.exitPointerLock();
  }
  document.getElementById('btnBreakWindow').addEventListener('click', ()=>{
    windowPanel.classList.remove('open');
    SFX.ventanaRota();
    endingSuicidio();
  });
  document.getElementById('btnWinClose').addEventListener('click', ()=>{
    windowPanel.classList.remove('open'); canvas.requestPointerLock();
  });

  // ---------- puerta: loop normal en fases 0-3, chequeo de Salida en disolución ----------
  function checkDoorProximity(){
    if(anyPanelOpen()) return;
    if(camera.position.z > ROOM.d/2 - 0.5 && Math.abs(camera.position.x) < 0.9){
      if(phaseIndex < PHASES.length - 1){
        // en fases normales, la puerta no hace nada por sí sola —
        // el avance de ciclo ahora depende de "dormir" en la cama.
        // (se deja el gesto de acercarse como refuerzo narrativo, sin trigger automático)
      } else {
        if(checkSalidaEligible()){
          endingSalida();
        }
      }
    }
  }

  // ============================================================
  // PC — overlay de pantalla completa con 4 actividades
  // ============================================================
  const pcOverlay = document.getElementById('pcOverlay');
  const pcContent = document.getElementById('pcContent');
  const pcTabs = document.getElementById('pcTabs');
  let activeTab = 'plataformas';

  function openPC(){
    pcOverlay.classList.add('open');
    document.exitPointerLock();
    SFX.computadora();
    renderTab(activeTab);
  }
  document.getElementById('pcClose').addEventListener('click', closePC);
  function closePC(){
    pcOverlay.classList.remove('open');
    canvas.requestPointerLock();
  }
  pcTabs.addEventListener('click', (e)=>{
    if(e.target.tagName !== 'BUTTON') return;
    [...pcTabs.children].forEach(b=>b.classList.remove('active'));
    e.target.classList.add('active');
    activeTab = e.target.dataset.tab;
    renderTab(activeTab);
  });

  function renderTab(tab){
    if(tab==='plataformas') renderPlataformas();
    else if(tab==='rpg') renderRPG();
    else if(tab==='twt') renderTwt();
    else if(tab==='foro') renderForo();
  }

  // ---------- twt ----------
  const twtHistory = [];
  function renderTwt(){
    const maxLen = Math.max(6, 60 - phaseIndex*14); // el espacio para escribir se acorta con las fases
    pcContent.innerHTML = `
      <div class="twt-box">
        <p style="font-size:11px;color:var(--fg-dim);margin-bottom:8px;">cuenta privada — nadie te sigue</p>
        <textarea id="twtInput" maxlength="${maxLen}" rows="3" placeholder="¿qué está pasando?"></textarea>
        <button id="twtPost">publicar</button>
        <div class="twt-feed" id="twtFeed"></div>
      </div>
    `;
    const feed = document.getElementById('twtFeed');
    feed.innerHTML = twtHistory.slice(-4).reverse().map(t=>`<div style="margin-bottom:6px;">— ${t || '(vacío)'}</div>`).join('');
    document.getElementById('twtPost').addEventListener('click', ()=>{
      const val = document.getElementById('twtInput').value.trim();
      twtHistory.push(val);
      SFX.notificacion();
      renderTwt();
    });
  }

  // ---------- foro ----------
  const FORO_THREADS = [
    { level:0, title:'nadie contrata a nadie ahora mismo', body:'Hilo genérico sobre lo difícil que está el mercado laboral. Tono resignado pero casi cómico — "todos estamos en la misma".' },
    { level:0, title:'recomienden algo para no pensar', body:'Recomendaciones de anime y videojuegos para pasar el rato. Ambiente comunitario, ligero.' },
    { level:1, title:'ya perdí la cuenta de qué día es', body:'Alguien cuenta que ya no sabe si es martes o sábado, que ya no distingue un día de otro.' },
    { level:1, title:'mi familia ya ni pregunta', body:'Alguien nota que en casa ya se acostumbraron a no preguntarle cómo está.' },
    { level:2, title:'a veces pienso que sería más fácil desaparecer', body:'Un hilo más pesado, sin detalles ni métodos — solo la sensación de no ver salida y el miedo a que a nadie le importe.' },
  ];
  function renderForo(){
    const visible = FORO_THREADS.filter(t => t.level <= Math.min(2, Math.floor(phaseIndex/1.3)));
    pcContent.innerHTML = `<div class="foro-list" id="foroList"></div>`;
    const list = document.getElementById('foroList');
    list.innerHTML = visible.map((t,i)=>`<div class="foro-thread" data-i="${i}">${t.title}</div>`).join('');
    list.querySelectorAll('.foro-thread').forEach(el=>{
      el.addEventListener('click', ()=>{
        const t = visible[+el.dataset.i];
        pcContent.innerHTML = `
          <div class="foro-body">
            <p>${t.body}</p>
            <button id="foroComment">comentar sobre tu vida</button>
          </div>`;
        document.getElementById('foroComment').addEventListener('click', ()=>{
          forumCommented = true;
          selfcare -= 2;
          pcContent.querySelector('.foro-body').innerHTML += `<p style="margin-top:10px;color:#a08a8a;">respuesta: "nadie pidió tu drama, cierra el post."</p>`;
        });
      });
    });
  }

  // ---------- rpg ----------
  const RPG_LINES_BY_PHASE = [
    ["Viajero, el bosque cambia según quien lo mira.", "¿Buscas algo que perdiste?", "El camino sigue más allá de donde ves."],
    ["El bosque cambia según quien lo mira.", "¿Buscas algo que perdiste?"],
    ["El bosque cambia...", "¿Buscas algo...?"],
    ["...cambia.", "...algo."],
  ];
  let rpgLineIndex = 0;
  function renderRPG(){
    const lines = RPG_LINES_BY_PHASE[Math.min(phaseIndex, RPG_LINES_BY_PHASE.length-1)];
    pcContent.innerHTML = `
      <div class="rpg-box">
        <div class="rpg-npc"></div>
        <div class="rpg-dialogue" id="rpgDialogue">${lines[0]}</div>
        <button id="rpgTalk">hablar</button>
      </div>`;
    rpgLineIndex = 0;
    document.getElementById('rpgTalk').addEventListener('click', ()=>{
      rpgLineIndex = (rpgLineIndex+1) % lines.length;
      document.getElementById('rpgDialogue').textContent = lines[rpgLineIndex];
      SFX.teclado();
    });
  }

  // ---------- plataformas (minijuego jugable) ----------
  let platRAF = null;
  function renderPlataformas(){
    pcContent.innerHTML = `
      <canvas id="platCanvas" width="480" height="220"></canvas>
      <div class="plat-hint">flechas para moverte · espacio para saltar · llega a la meta</div>
    `;
    const cv = document.getElementById('platCanvas');
    const ctx = cv.getContext('2d');
    const groundY = 180;
    const degradedSpeed = Math.max(2.5, 4.5 - phaseIndex*0.4);
    const player = { x:20, y:groundY-16, w:14, h:16, vy:0, onGround:true };
    const goal = { x:440, y:groundY-20, w:14, h:20 };
    const gaps = [ {x:140,w:40}, {x:260,w:50} ];
    let done = false, fell = false;
    const pk = {};
    function kd(e){ pk[e.key]=true; if(e.key===' ') e.preventDefault(); }
    function ku(e){ pk[e.key]=false; }
    window.addEventListener('keydown', kd);
    window.addEventListener('keyup', ku);

    function loop(){
      if(done){ return; }
      if(pk['ArrowRight']) player.x += degradedSpeed;
      if(pk['ArrowLeft']) player.x -= degradedSpeed;
      if(pk[' '] && player.onGround){ player.vy = -7.2; player.onGround = false; SFX.pasos(); }
      player.vy += 0.35;
      player.y += player.vy;

      const overGap = gaps.some(g => player.x+player.w > g.x && player.x < g.x+g.w);
      if(player.y >= groundY-16 && !overGap){ player.y = groundY-16; player.vy = 0; player.onGround = true; }
      if(player.y > 240){ fell = true; done = true; }

      if(player.x+player.w > goal.x){ done = true; }

      ctx.clearRect(0,0,480,220);
      ctx.fillStyle = '#131315'; ctx.fillRect(0,0,480,220);
      ctx.fillStyle = '#28282c';
      ctx.fillRect(0, groundY, gaps[0].x, 40);
      ctx.fillRect(gaps[0].x+gaps[0].w, groundY, gaps[1].x-(gaps[0].x+gaps[0].w), 40);
      ctx.fillRect(gaps[1].x+gaps[1].w, groundY, 480-(gaps[1].x+gaps[1].w), 40);
      ctx.fillStyle = '#c9c9cf'; ctx.fillRect(goal.x, goal.y, goal.w, goal.h);
      ctx.fillStyle = '#8f8f96'; ctx.fillRect(player.x, player.y, player.w, player.h);

      if(!done) platRAF = requestAnimationFrame(loop);
      else{
        ctx.fillStyle = 'rgba(5,5,6,0.7)'; ctx.fillRect(0,0,480,220);
        ctx.fillStyle = '#c9c9cf'; ctx.font = '12px monospace';
        ctx.fillText(fell ? 'no llegaste — cierra y vuelve a intentar' : 'completado', 160, 110);
        window.removeEventListener('keydown', kd);
        window.removeEventListener('keyup', ku);
      }
    }
    loop();
  }

  // ============================================================
  // render loop
  // ============================================================
  let lastT = performance.now();
  function animate(){
    requestAnimationFrame(animate);
    const now = performance.now();
    const dt = Math.min((now-lastT)/1000, 0.05);
    lastT = now;

    if(!anyPanelOpen()){
      camera.rotation.order = 'YXZ';
      camera.rotation.y = yaw;
      camera.rotation.x = pitch;

      let mx=0, mz=0;
      if(keys['w']) mz -= 1;
      if(keys['s']) mz += 1;
      if(keys['a']) mx -= 1;
      if(keys['d']) mx += 1;
      if(mx||mz){
        const len = Math.hypot(mx,mz);
        mx/=len; mz/=len;
        const forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
        const right = new THREE.Vector3(Math.sin(yaw+Math.PI/2), 0, Math.cos(yaw+Math.PI/2));
        const move = new THREE.Vector3()
          .addScaledVector(forward, mz)
          .addScaledVector(right, mx)
          .multiplyScalar(PLAYER_SPEED*dt);
        camera.position.add(move);
      }
      camera.position.x = Math.max(-BOUND.x, Math.min(BOUND.x, camera.position.x));
      camera.position.z = Math.max(-BOUND.z, Math.min(BOUND.z, camera.position.z));

      updateHotspot();
      checkDoorProximity();
    }

    renderer.render(scene, camera);
  }
  animate();
})();
</script>
</body>
</html>
