<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panopticon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&display=swap">
</head>
<body style="margin:0;">
<div id="app-root"></div>
<style>
  :root{
    --void:#050506; --fg:#8f8f96; --fg-dim:#4a4a50; --accent:#c9c9cf;
    --font-pixel:'Press Start 2P','SF Mono',monospace;
    --font-crt:'DotGothic16','Press Start 2P',monospace;
    --purple-strong:#b026ff;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  #app-root{
    background:var(--void); color:var(--fg);
    font-family:var(--font-pixel);
    width:100%; height:100vh; position:relative; overflow:hidden;
  }
  #sceneCanvas{ display:block; width:100%; height:100%; }
  .hud{
    position:absolute; top:14px; left:16px; font-size:12px; color:var(--fg-dim);
    letter-spacing:.03em; pointer-events:none; line-height:2.1; z-index:5;
  }
  .hud b{ color:var(--accent); }
  #phoneHudHint{
    position:absolute; top:14px; right:16px; font-size:12px; color:var(--fg-dim);
    letter-spacing:.03em; pointer-events:none; line-height:2.1; z-index:5; text-align:right;
  }
  #phoneHudHint b{ color:var(--accent); }
  #startOverlay{
    position:absolute; inset:0; background:rgba(5,5,6,0.62); backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:20px; z-index:50;
  }
  #startOverlay h1{
    font-family:var(--font-crt); font-size:52px; color:var(--purple-strong); font-weight:400;
    margin-bottom:32px; letter-spacing:.1em; text-align:center;
    -webkit-text-stroke:1.5px var(--purple-strong);
    text-shadow:0 0 16px rgba(176,38,255,.9), 0 0 34px rgba(176,38,255,.6), 0 0 60px rgba(176,38,255,.35);
  }
  #startOverlay p{ font-size:12px; color:var(--fg-dim); max-width:680px; line-height:2.1; margin-bottom:18px; }
  #startOverlay .warning{
    color:#c9b8b8; border:2px solid #5a2a2a; background:rgba(60,20,20,0.18);
    padding:16px 20px; margin-bottom:22px; max-width:620px; line-height:2;
  }
  #startOverlay .warning b{ color:#e0a0a0; }
  #startOverlay button{
    background:#1c1c1f; color:var(--fg); border:1px solid #2a2a2e;
    padding:14px 22px; font-family:inherit; font-size:13px; cursor:pointer; letter-spacing:.02em;
  }
  #startOverlay button:hover{ color:var(--accent); border-color:#3a3a3e; }
  .controls-hint{ font-size:11px; color:#3ddc61; margin-top:16px; letter-spacing:.02em; line-height:2; }

  #interactPrompt{
    position:absolute; bottom:14%; left:50%; transform:translateX(-50%);
    font-size:12px; color:var(--accent); background:rgba(10,10,12,0.6);
    padding:8px 12px; border:1px solid #2a2a2e; letter-spacing:.03em;
    display:none; z-index:6; pointer-events:none;
  }

  .monologue{
    position:absolute; bottom:20%; left:50%; transform:translateX(-50%);
    font-size:21px; color:var(--accent); text-align:center; max-width:62%;
    opacity:0; transition:opacity 1.4s ease; z-index:7; pointer-events:none; letter-spacing:.02em;
    line-height:1.9;
  }
  .monologue.show{ opacity:0.9; }

  #timeSkipCaption{
    position:absolute; top:22%; left:50%; transform:translateX(-50%);
    font-family:var(--font-crt); font-size:21px; color:var(--purple-strong); letter-spacing:.08em;
    text-shadow:0 0 14px rgba(176,38,255,.8), 0 0 28px rgba(176,38,255,.5);
    opacity:0; transition:opacity 1.1s ease; z-index:7; pointer-events:none; text-align:center;
  }
  #timeSkipCaption.show{ opacity:1; }

  #fadeLayer{
    position:absolute; inset:0; background:#000; opacity:0; pointer-events:none; z-index:20;
    transition:opacity 1.1s ease;
  }
  #sceneCanvas{ transition:filter 0.22s ease; }
  #sceneCanvas.blurred{ filter:blur(7px) brightness(0.7); }
  #sceneCanvas.blurred-soft{ filter:blur(2.5px) brightness(0.92); }
  #fadeLayer.white{ background:#e8e8ea; }
  #fadeLayer.show{ opacity:1; }

  /* ---------- panels de elección ---------- */
  #bathroomPanel, #baneraPanel, #windowPanel, #notePanel{
    position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(5,5,6,0.55); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    z-index:30; flex-direction:column; gap:10px;
  }
  #bathroomPanel.open, #baneraPanel.open, #windowPanel.open, #notePanel.open{ display:flex; }
  #bathroomPanel button, #baneraPanel button, #windowPanel button, #notePanel button{
    background:#1c1c1f; color:var(--fg); border:1px solid #2a2a2e;
    padding:17px 22px; font-family:inherit; font-size:16px; cursor:pointer; width:420px; line-height:1.8;
  }
  #bathroomPanel button:hover, #baneraPanel button:hover, #windowPanel button:hover, #notePanel button:hover{ color:var(--accent); border-color:#3a3a3e; }
  #bathroomPanel p, #baneraPanel p, #windowPanel p, #notePanel p{ font-size:15px; color:var(--fg-dim); margin-bottom:10px; max-width:480px; text-align:center; line-height:2; }

  /* ---------- secuencia de memoria al dormir (novela visual) ---------- */
  #bedFade{
    position:absolute; inset:0; background:#000; opacity:0; pointer-events:none; z-index:22;
    transition:opacity 1.8s ease;
  }
  #bedFade.show{ opacity:0.8; }
  #bedDialogueBox{
    position:absolute; bottom:16%; left:50%; transform:translateX(-50%);
    width:min(700px,90%); min-height:110px;
    background:rgba(8,8,10,0.7); border:1px solid #2a2a2e;
    padding:26px 30px; z-index:23; display:none; flex-direction:column; gap:14px; cursor:pointer;
  }
  #bedDialogueBox.show{ display:flex; }
  #bedDialogueText{ font-size:19px; color:var(--accent); line-height:1.7; min-height:4.4em; }
  #bedDialogueHint{ font-size:13px; color:var(--fg-dim); text-align:right; letter-spacing:.03em; opacity:0.8; }
  #bedDialogueHint.wake{ color:var(--accent); opacity:1; }

  /* ---------- pantalla de créditos (final Suicidio) ---------- */
  /* ---------- pantalla final compartida (los 3 finales): gracias por jugar + título + reiniciar ---------- */
  #endScreen{
    position:absolute; inset:0; background:#000; z-index:65; display:none;
    align-items:center; justify-content:center; flex-direction:column; gap:26px;
    opacity:0; transition:opacity 1.6s ease; overflow-y:auto; padding:40px 20px;
  }
  #endScreen.show{ display:flex; opacity:1; }
  .end-thanks{
    font-family:var(--font-pixel); font-size:14px; color:#c9c9cf; letter-spacing:.2em; text-transform:uppercase;
  }
  .end-title{
    font-family:var(--font-crt); font-size:48px; color:var(--purple-strong); letter-spacing:.1em;
    -webkit-text-stroke:1.5px var(--purple-strong);
    text-shadow:0 0 18px rgba(176,38,255,.9), 0 0 36px rgba(176,38,255,.6), 0 0 60px rgba(176,38,255,.35);
  }
  #btnRestart{
    font-family:var(--font-pixel); font-size:13px; background:#1c1c1f; color:#eee;
    border:2px solid var(--purple-strong); padding:14px 26px; cursor:pointer;
    box-shadow:0 0 14px rgba(176,38,255,.4);
  }
  #btnRestart:hover{ background:#2a1030; box-shadow:0 0 20px rgba(176,38,255,.7); }

  /* ---------- webcam reflection (fase disolución) ---------- */
  #reflection{
    position:absolute; bottom:24px; right:24px; width:150px; height:112px;
    border:1px solid #3a3a3e; overflow:hidden; z-index:8; display:none;
    background:#000;
  }
  #reflection.on{ display:block; }
  #reflection video{
    width:100%; height:100%; object-fit:cover; transform:scaleX(-1);
    filter: contrast(1.3) saturate(0.4) hue-rotate(0deg);
    animation: glitchShift 0.6s infinite steps(2);
  }
  /* si vas camino al final bueno (Salida), el reflejo se ve tranquilo/normal en vez de glitcheado */
  #reflection.calm video{
    animation: none; filter: contrast(1.02) saturate(0.95); transform: scaleX(-1);
  }
  @keyframes glitchShift{
    0%{ filter:contrast(1.3) saturate(0.4) hue-rotate(0deg) brightness(1); transform:scaleX(-1) translateX(0); }
    30%{ filter:contrast(1.6) saturate(0.2) hue-rotate(30deg) brightness(1.2); transform:scaleX(-1) translateX(-2px); }
    55%{ filter:contrast(1.1) saturate(0.6) hue-rotate(-20deg) brightness(0.8); transform:scaleX(-1) translateX(2px); }
    80%{ filter:contrast(1.8) saturate(0.1) hue-rotate(60deg) brightness(1.4); transform:scaleX(-1) translateX(0); }
    100%{ filter:contrast(1.3) saturate(0.4) hue-rotate(0deg) brightness(1); transform:scaleX(-1) translateX(0); }
  }

  /* ---------- PC overlay: escritorio Linux retro (estilo CDE/Window Maker, 8-bit) ---------- */
  #pcOverlay{
    position:absolute; inset:0; z-index:40; display:none;
  }
  #pcOverlay.open{ display:block; }
  #pcClose{
    position:absolute; top:10px; right:14px; background:#1c1c1f; border:2px solid #000; color:var(--fg);
    font-family:inherit; font-size:11px; cursor:pointer; z-index:50; padding:8px 12px;
    box-shadow:inset -2px -2px 0 rgba(0,0,0,.5), inset 2px 2px 0 rgba(255,255,255,.15);
  }
  #pcClose:hover{ color:var(--accent); border-color:#3ddc61; }

  /* escritorio con wallpaper retro pixelado y accesos directos 8-bit */
  #pcDesktop{
    position:absolute; inset:0;
    background:
      repeating-linear-gradient(45deg, rgba(255,46,196,0.14) 0 8px, transparent 8px 16px),
      repeating-linear-gradient(-45deg, rgba(31,224,255,0.14) 0 8px, transparent 8px 16px),
      linear-gradient(160deg,#1a0a2e 0%, #0a0a14 100%);
    display:grid; grid-template-columns:repeat(auto-fill,110px); grid-auto-rows:120px;
    gap:18px; padding:60px 30px 30px; align-content:start;
  }
  #pcOverlay.appOpen #pcDesktop{ visibility:hidden; }
  .pc-icon{
    display:flex; flex-direction:column; align-items:center; gap:10px; cursor:pointer;
    width:110px; padding:8px 4px; border:2px solid transparent;
  }
  .pc-icon:hover{ border-color:#3ddc6180; background:rgba(61,220,97,0.08); }
  .pc-icon span{
    font-family:var(--font-pixel); font-size:10px; color:#eaeaf0; text-align:center;
    text-shadow:2px 2px 0 #000; line-height:1.6; word-break:break-word;
  }
  .pixel-icon{ width:64px; height:64px; position:relative; image-rendering:pixelated; flex-shrink:0; }
  .pixel-icon i{ position:absolute; width:8px; height:8px; top:0; left:0; }

  /* ventana estilo CDE/Window Maker */
  #pcWindow{
    display:none; position:absolute; inset:2% 2.5%;
    background:#c9c9d4; border:3px solid #000; box-shadow:8px 8px 0 rgba(0,0,0,.55);
    flex-direction:column;
  }
  #pcOverlay.appOpen #pcWindow{ display:flex; }
  #pcWindowTitlebar{
    background:linear-gradient(90deg,#1e5fd8,#17c9e8); color:#fff; border-bottom:3px solid #000;
    padding:11px 12px; display:flex; align-items:center; justify-content:space-between;
    font-family:var(--font-pixel); font-size:11px; text-shadow:2px 2px 0 rgba(0,0,0,.5);
  }
  #pcWindowBtns{ display:flex; gap:6px; }
  #pcWindowBtns button{
    width:26px; height:24px; border:2px solid #000; cursor:pointer; font-family:var(--font-pixel);
    font-size:10px; line-height:1; box-shadow:inset -2px -2px 0 rgba(0,0,0,.4), inset 2px 2px 0 rgba(255,255,255,.5);
  }
  .pcWinMin{ background:#ffd23f; }
  .pcWinClose{ background:#ff5a5a; color:#fff; }
  #pcContent{ flex:1; overflow:auto; padding:20px; background:#111014; }
  #pcContent::-webkit-scrollbar{ width:18px; }
  #pcContent::-webkit-scrollbar-track{ background:#1a1a1a; border-left:3px solid #000; }
  #pcContent::-webkit-scrollbar-thumb{ background:#3ddc61; border:3px solid #000; }

  /* twt — reskin oscuro estilo X/Twitter */
  .twt-app{ max-width:620px; margin:0 auto; }
  .twt-compose{ display:flex; gap:10px; padding:4px 4px 14px; border-bottom:1px solid #2f3336; }
  .twt-avatar{ width:38px; height:38px; border-radius:50%; background:#3a3a3e; flex-shrink:0; }
  .twt-avatar.sm{ width:34px; height:34px; }
  .twt-compose-body{ flex:1; min-width:0; }
  .twt-compose textarea{
    width:100%; background:transparent; color:#e7e9ea; border:none; outline:none;
    font-family:inherit; font-size:15px; resize:none; line-height:2; padding:6px 0;
    caret-color:#1d9bf0;
  }
  .twt-compose-footer{ display:flex; justify-content:flex-end; align-items:center; gap:10px; }
  .twt-charcount{ font-size:12px; color:#71767b; }
  .twt-postbtn{
    background:#1d9bf0; color:#fff; border:none; border-radius:4px;
    padding:11px 18px; font-family:inherit; font-size:14px; cursor:pointer;
  }
  .twt-postbtn:hover{ background:#1a8cd8; }
  .twt-postbtn:disabled{ background:#0d4a70; color:#9fb8c7; cursor:not-allowed; }
  .twt-feed{ margin-top:2px; }
  .twt-post{ display:flex; gap:10px; padding:14px 4px; border-bottom:1px solid #2f3336; }
  .twt-post-body{ flex:1; min-width:0; }
  .twt-post-head{ display:flex; gap:6px; align-items:baseline; font-size:14px; flex-wrap:wrap; row-gap:4px; }
  .twt-name{ color:#e7e9ea; }
  .twt-post.critic .twt-name{ color:#a08a8a; }
  .twt-handle, .twt-time{ color:#71767b; font-size:12px; }
  .twt-text{ color:#e7e9ea; font-size:15px; line-height:2; margin-top:6px; white-space:pre-wrap; word-break:break-word; }
  .twt-actions{ display:flex; gap:28px; margin-top:10px; color:#71767b; font-size:12px; }
  .twt-actions span{ display:flex; align-items:center; gap:5px; }
  .twt-actions svg{ width:16px; height:16px; fill:currentColor; }
  .twt-empty{ text-align:center; color:#71767b; font-size:13px; padding:30px 0; line-height:1.8; }
  .twt-hint{ font-size:11.5px; color:#71767b; margin:8px 4px 0; }

  /* foro — reskin oscuro estilo imageboard (2chan/4chan) */
  .foro-board{ max-width:760px; margin:0 auto; }
  .foro-hint{ font-size:11.5px; color:#5a5a60; margin-bottom:12px; }
  .foro-thread-card{
    border:1px solid #222225; background:#0e0e10; margin-bottom:10px; padding:14px 16px; cursor:pointer;
    display:flex; align-items:center; justify-content:space-between; gap:10px; transition:background .1s ease;
  }
  .foro-thread-card:hover{ border-color:#3ddc6180; background:rgba(61,220,97,0.05); }
  .foro-thread-card .fcard-main{ flex:1; min-width:0; }
  .foro-thread-card .fchevron{ color:#3ddc61; font-size:16px; flex-shrink:0; opacity:.75; }
  .foro-thread-card .fh{ font-size:12.5px; color:#5a8a3a; margin-bottom:10px; line-height:1.6; }
  .foro-thread-card .ft{ font-size:15px; color:var(--accent); margin-bottom:10px; line-height:1.6; }
  .foro-thread-card .fp{ font-size:13.5px; color:var(--fg-dim); line-height:1.9; }
  .foro-thread-card .freplies{ font-size:12px; color:#5a5a60; margin-top:10px; }
  .foro-post{ border:1px solid #222225; background:#0e0e10; padding:14px 16px; margin-bottom:8px; font-size:13.5px; }
  .foro-post.op{ border-color:#3a3a3e; }
  .foro-post .fhead{ font-size:12px; color:#71767b; margin-bottom:10px; line-height:1.6; }
  .foro-post .fhead b{ color:#8ba86a; }
  .foro-post .fno{ color:#5a5a60; }
  .foro-body-text{ line-height:2.1; font-size:13.5px; }
  .fquote{ color:#7a92c4; }
  .greentext{ color:#8fbf5f; }
  .foro-replies{ margin-top:10px; padding-left:14px; border-left:1px solid #222225; }
  .foro-back{
    background:#1c1c1f; color:var(--fg); border:1px solid #2a2a2e; padding:11px 18px;
    font-family:inherit; font-size:13px; cursor:pointer; margin-bottom:12px;
  }
  .foro-back:hover{ color:#3ddc61; border-color:#3ddc6180; }
  .foro-comment-box{ margin-top:14px; }
  .foro-comment-hint{ font-size:11.5px; color:#5a5a60; margin-bottom:6px; }
  .foro-comment-box textarea{
    width:100%; background:#111113; color:var(--fg); border:1px solid #2a2a2e;
    font-family:inherit; font-size:14px; line-height:1.9; padding:10px; resize:none;
    caret-color:#3ddc61;
  }
  .foro-comment-box button{
    margin-top:8px; background:#1c1c1f; color:#a08a8a; border:1px solid #3a2a2a;
    padding:11px 18px; font-family:inherit; font-size:13px; cursor:pointer;
  }
  .foro-comment-box button:hover:not(:disabled){ color:#c9a0a0; border-color:#5a2a2a; }
  .foro-comment-box button:disabled{ opacity:.4; cursor:not-allowed; }

  /* rpg */
  .rpg-box{ max-width:1000px; width:100%; margin:0 auto; text-align:center; }
  #rpgCanvas{
    display:block; margin:0 auto; background:#111013; border:1px solid #2a2a2e;
    width:100%; max-width:1000px; height:auto; image-rendering:pixelated;
  }
  .rpg-hint{ font-size:13px; color:var(--fg-dim); margin:12px 0 14px; line-height:1.8; }
  .rpg-dialogue{
    border:1px solid #2a2a2e; padding:16px; font-size:17px; line-height:2; min-height:60px; margin-bottom:14px;
  }
  .rpg-box button{
    background:#1c1c1f; color:var(--fg); border:1px solid #2a2a2e; padding:12px 18px;
    font-family:inherit; font-size:13px; cursor:pointer; margin:4px; line-height:1.6;
  }
  .rpg-choices{ display:flex; flex-wrap:wrap; justify-content:center; gap:8px; }

  /* plataformas */
  #platCanvas{
    display:block; margin:0 auto; background:#0c0c0e; border:1px solid #2a2a2e;
    width:100%; max-width:1100px; height:auto; image-rendering:pixelated;
  }
  .plat-hint{ text-align:center; font-size:13px; color:var(--fg-dim); margin-top:12px; line-height:1.8; }
  .plat-hint span{ color:var(--accent); }
  #platRetry{
    background:#1c1c1f; color:var(--fg); border:1px solid #2a2a2e;
    padding:11px 18px; font-family:inherit; font-size:14px; cursor:pointer;
  }
  #platRetry:hover{ color:var(--accent); border-color:#3a3a3e; }

  /* ---------- celular: mensajes de amigos que nunca contestas ---------- */
  #phonePanel{
    position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(5,5,6,0.55); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    z-index:30; flex-direction:column;
  }
  #phonePanel.open{ display:flex; }
  #phoneContent{
    width:min(480px,90%); max-height:78vh; overflow-y:auto;
    background:#141417; border:2px solid #2a2a2e; box-shadow:0 0 0 6px #000, 8px 8px 0 rgba(0,0,0,.4);
    padding:22px;
  }
  #phoneContent::-webkit-scrollbar{ width:14px; }
  #phoneContent::-webkit-scrollbar-track{ background:#1a1a1a; border-left:2px solid #000; }
  #phoneContent::-webkit-scrollbar-thumb{ background:#3ddc61; border:2px solid #000; }
  .phone-header{ font-size:14px; color:var(--accent); letter-spacing:.1em; text-transform:uppercase; margin-bottom:6px; }
  .phone-hint{ font-size:11.5px; color:#5a5a60; margin-bottom:16px; line-height:1.8; }
  .phone-contacts{ display:flex; flex-direction:column; gap:10px; }
  .phone-contact{
    display:flex; align-items:center; gap:14px; padding:10px; border:1px solid #222225; cursor:pointer;
    transition:background .1s ease;
  }
  .phone-contact:hover{ border-color:#3ddc6180; background:rgba(61,220,97,0.06); }
  .phone-avatar{ width:44px; height:44px; position:relative; image-rendering:pixelated; flex-shrink:0; }
  .phone-avatar.lg{ width:56px; height:56px; }
  .phone-avatar i{ position:absolute; width:8px; height:8px; top:0; left:0; }
  .phone-contact-body{ flex:1; min-width:0; }
  .phone-contact-top{ display:flex; align-items:center; gap:8px; }
  .phone-contact-name{ font-size:14px; color:var(--fg); }
  .phone-badge{ background:#e8394a; color:#fff; font-size:10px; padding:2px 7px; border-radius:10px; line-height:1.4; }
  .phone-contact-preview{ font-size:12px; color:#8a8a92; margin-top:5px; line-height:1.6; }
  .phone-contact-preview.empty{ color:#4a4a50; font-style:italic; }
  .phone-close{
    margin-top:18px; width:100%; background:#1c1c1f; color:var(--fg); border:1px solid #2a2a2e;
    padding:13px 16px; font-family:inherit; font-size:13px; cursor:pointer;
  }
  .phone-close:hover{ color:var(--accent); border-color:#3a3a3e; }
  .phone-back{
    background:#1c1c1f; color:var(--fg); border:1px solid #2a2a2e; padding:11px 16px;
    font-family:inherit; font-size:12px; cursor:pointer; margin-bottom:16px;
  }
  .phone-back:hover{ color:#3ddc61; border-color:#3ddc6180; }
  .phone-thread-header{ display:flex; align-items:center; gap:14px; margin-bottom:16px; padding-bottom:14px; border-bottom:1px solid #222225; }

  // ---------- iconos de escritorio 8-bit (pixel-art vía box-shadow) ----------
  function pixelArt(rows, palette, px){
    const shadows = [];
    rows.forEach((row, y)=>{
      [...row].forEach((ch, x)=>{
        if(ch === '.' || !palette[ch]) return;
        shadows.push(`${x*px}px ${y*px}px 0 ${palette[ch]}`);
      });
    });
    return shadows.join(',');
  }
  function paintPixelIcon(id, rows, palette, px=8){
    const el = document.getElementById(id);
    if(!el) return;
    const origin = document.createElement('i');
    origin.style.boxShadow = pixelArt(rows, palette, px);
    el.appendChild(origin);
  }
  paintPixelIcon('iconJoystick', [
    '...rr...',

    'ffffffff',

  const canvas = document.getElementById('sceneCanvas');
  const enterBtn = document.getElementById('enterBtn');
  const startOverlay = document.getElementById('startOverlay');
  const phaseLabel = document.getElementById('phaseLabel');
  const interactPrompt = document.getElementById('interactPrompt');
  const monologueEl = document.getElementById('monologue');
  const fadeLayer = document.getElementById('fadeLayer');

  // ============================================================
  // AUDIO — archivos reales de Musica/ y Musica/Foleys/
  // ============================================================
  const AUDIO = {};
  const AUDIO_PATHS = {
    habitacion: 'Musica/habitacion.wav',
    computadora: 'Musica/computadora.wav',
    bano:        'Musica/baño.wav',
    salida:      'Musica/salida.wav',
    dormir:      'Musica/dormir.wav',
    pensamientos:'Musica/pensamientos.wav',
    caida:       'Musica/Foleys/caida.wav',
    pasos1:      'Musica/Foleys/pasos op 1.wav',
    pasos2:      'Musica/Foleys/pasos op 2.wav',
    teclado:     'Musica/Foleys/teclado.wav',
    ventana:     'Musica/Foleys/ventasna.wav',
  };

  function initAudioElements(){
    for(const [k, path] of Object.entries(AUDIO_PATHS)){
      AUDIO[k] = new Audio(path);
    }
    AUDIO.habitacion.loop   = true;
    AUDIO.habitacion.volume = 0.5;
    AUDIO.pensamientos.loop = true;
  }

  let currentAmbient = null;
  let currentOneShot = null;

  function stopAll(){
    if(currentAmbient){ currentAmbient.pause(); currentAmbient.currentTime = 0; currentAmbient = null; }
    if(currentOneShot){ currentOneShot.pause(); currentOneShot.currentTime = 0; currentOneShot = null; }
  }
  function stopAmbient(){
    if(currentAmbient){ currentAmbient.pause(); currentAmbient.currentTime = 0; currentAmbient = null; }
  }

  // interruptAmbient=true → para la pista de fondo antes de reproducir
  // interruptAmbient=false → foley corto, no interrumpe el fondo
  function playOne(name, volume=1.0, interruptAmbient=true){
    if(interruptAmbient) stopAll();
    const a = AUDIO[name];
    if(!a) return;
    a.loop = false;
    a.volume = volume;
    a.currentTime = 0;
    a.play().catch(()=>{});
    if(interruptAmbient) currentOneShot = a;
  }

  // tono sintetizado solo para notificacion (sin archivo)
  let actx = null;
  function ac(){ if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)(); return actx; }
  function tone(freq, dur, type='sine', gain=0.06, delay=0){
    const c = ac();
    const t0 = c.currentTime + delay;
    const osc = c.createOscillator();
    const g = c.createGain();
    osc.type = type; osc.frequency.value = freq;
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(gain, t0+0.05);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    osc.connect(g); g.connect(c.destination);
    osc.start(t0); osc.stop(t0+dur+0.05);
  }

  let pasosToggle = false;
  const SFX = {
    habitacion(){
      stopAll();
      AUDIO.habitacion.loop = true;
      AUDIO.habitacion.volume = 0.5;
      currentAmbient = AUDIO.habitacion;
      AUDIO.habitacion.currentTime = 0;
      AUDIO.habitacion.play().catch(()=>{});
    },
    computadora(){ playOne('computadora', 0.7, true); },
    bano(){        playOne('bano', 0.8, true); },
    salida(){      playOne('salida', 0.9, true); },
    dormir(){      playOne('dormir', 0.8, true); },
    ventanaRota(){ playOne('ventana', 1.0, true); },
    pensamientos(intensity){
      stopAll();
      AUDIO.pensamientos.volume = Math.min(1.0, 0.3 + (intensity||0) * 0.12);
      AUDIO.pensamientos.loop = true;
      currentAmbient = AUDIO.pensamientos;
      AUDIO.pensamientos.currentTime = 0;
      AUDIO.pensamientos.play().catch(()=>{});
    },
    caida(){ playOne('caida', 1.0, true); },
    pasos(){
      pasosToggle = !pasosToggle;
      playOne(pasosToggle ? 'pasos1' : 'pasos2', 0.5, false); // foley corto, no interrumpe
    },
    teclado(){     playOne('teclado', 0.35, false); }, // foley corto
    notificacion(){ tone(900, 0.15, 'sine', 0.03); },
    tareaTick(){ tone(700, 0.12, 'sine', 0.025); },
    phoneChime(){ tone(660, 0.18, 'sine', 0.028); tone(880, 0.22, 'sine', 0.02, 0.06); },
    phoneTap(){ tone(520, 0.06, 'sine', 0.02); },
    phoneWhoosh(){ tone(260, 0.22, 'sine', 0.02); tone(480, 0.18, 'sine', 0.015, 0.05); },
    phonePop(){ tone(780, 0.08, 'sine', 0.022); tone(1020, 0.06, 'sine', 0.016, 0.045); },
  };

  // ============================================================
  // Three.js setup (base de Yael, sin cambios estructurales)
  // ============================================================
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0e0710);
  scene.fog = new THREE.Fog(0x1a0a22, 4, 13);

  const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.05, 100);
  camera.position.set(0, 1.6, 1.4);

  const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  renderer.toneMapping = THREE.ReinhardToneMapping;
  renderer.toneMappingExposure = 1.2;

  // EffectComposer + Bloom
  let composer = null;
  try {
    const renderPass = new THREE.RenderPass(scene, camera);
    const bloomPass = new THREE.UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      0.50, 0.38, 0.88
    );
    composer = new THREE.EffectComposer(renderer);
    composer.addPass(renderPass);
    composer.addPass(bloomPass);
  } catch(e){ console.warn('Bloom unavailable:', e); }

  window.addEventListener('resize', ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    if(composer) composer.setSize(window.innerWidth, window.innerHeight);
  });

  const ROOM = { w: 5, d: 5, h: 2.6 };

  // ---------- texturas procedurales (canvas) — sin assets externos ----------
  function makeCanvas(w,h){ const c=document.createElement('canvas'); c.width=w; c.height=h; return c; }

  function makeWoodTexture(base, grain){
    const cv = makeCanvas(256,256); const ctx = cv.getContext('2d');
    ctx.fillStyle = base; ctx.fillRect(0,0,256,256);
    ctx.globalAlpha = 0.55;
    for(let i=0;i<48;i++){
      ctx.strokeStyle = grain;
      ctx.lineWidth = 0.6 + Math.random()*1.8;
      ctx.beginPath();
      let y = Math.random()*256;
      ctx.moveTo(0,y);
      for(let x=8;x<=256;x+=12){ y += (Math.random()-0.5)*7; ctx.lineTo(x,y); }
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    const tex = new THREE.CanvasTexture(cv);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    return tex;
  }

  function makeNoiseTexture(base, noise, density=1800){
    const cv = makeCanvas(128,128); const ctx = cv.getContext('2d');
    ctx.fillStyle = base; ctx.fillRect(0,0,128,128);
    for(let i=0;i<density;i++){
      ctx.globalAlpha = Math.random()*0.18;
      ctx.fillStyle = noise;
      ctx.fillRect(Math.random()*128, Math.random()*128, 1+Math.random()*2, 1+Math.random()*2);
    }
    ctx.globalAlpha = 1;
    const tex = new THREE.CanvasTexture(cv);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    return tex;
  }

  function makeRugTexture(){
    const cv = makeCanvas(256,256); const ctx = cv.getContext('2d');
    ctx.fillStyle = '#3a0f1a'; ctx.fillRect(0,0,256,256);
    ctx.strokeStyle = '#6a1624'; ctx.lineWidth = 9;
    ctx.strokeRect(12,12,232,232);
    ctx.strokeStyle = '#20060c'; ctx.lineWidth = 3;
    ctx.strokeRect(22,22,212,212);
    ctx.save();
    ctx.translate(128,128);
    ctx.strokeStyle = '#7a1c2c'; ctx.lineWidth = 2.5;
    for(let r=18;r<118;r+=22){
      ctx.beginPath();
      ctx.moveTo(0,-r); ctx.lineTo(r,0); ctx.lineTo(0,r); ctx.lineTo(-r,0); ctx.closePath();
      ctx.stroke();
    }
    ctx.fillStyle = '#b8903f';
    for(let a=0;a<10;a++){
      const ang = a/10*Math.PI*2;
      ctx.beginPath();
      ctx.arc(Math.cos(ang)*74, Math.sin(ang)*74, 3.2, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
    return new THREE.CanvasTexture(cv);
  }

  function makeTetrisTexture(){
    const cv = makeCanvas(128,96); const ctx = cv.getContext('2d');
    ctx.fillStyle = '#050912'; ctx.fillRect(0,0,128,96);
    const colors = ['#1fe0ff','#ff2ec4','#7cff4a','#ffd23f','#7a5cff'];
    for(let y=0;y<96;y+=8){
      for(let x=0;x<128;x+=8){
        if(Math.random()<0.38){
          ctx.fillStyle = colors[(Math.random()*colors.length)|0];
          ctx.fillRect(x+1,y+1,6,6);
        }
      }
    }
    return new THREE.CanvasTexture(cv);
  }

  const wallTex = makeNoiseTexture('#1c1c1f','#050505', 2200); wallTex.repeat.set(4,2);

  const wallMat = new THREE.MeshStandardMaterial({ color: 0x1c1c1f, map:wallTex, roughness: 1, flatShading:true });
  const floorMat = new THREE.MeshStandardMaterial({ color: 0x131315, map:floorTex, roughness: 1, flatShading:true });
  const ceilMat  = new THREE.MeshStandardMaterial({ color: 0x0c0c0d, roughness: 1, flatShading:true });
  const furnMat  = new THREE.MeshStandardMaterial({ color: 0x28282c, roughness: 1, flatShading:true });
  const doorMat  = new THREE.MeshStandardMaterial({ color: 0x3a3a3e, roughness: 0.8, flatShading:true, emissive:0x1a1a1e, emissiveIntensity:0.3 });
  const doorColdColor = new THREE.Color(0x3a3a3e);
  const doorHopeColor = new THREE.Color(0x2f6b46);

  const monitorScreenMat = new THREE.MeshStandardMaterial({ color: 0x0a1220, roughness:0.3, emissive:0xffffff, emissiveMap: makeTetrisTexture(), emissiveIntensity:1.5 });
  const sinkMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1e, roughness:0.6, flatShading:true });
  const woodMat = new THREE.MeshStandardMaterial({ color:0xffffff, map: makeWoodTexture('#3a2a1e','#1a1109'), roughness:0.7, metalness:0.05 });
  const wardrobeWoodMat = new THREE.MeshStandardMaterial({ color:0xffffff, map: makeWoodTexture('#2e2016','#150d07'), roughness:0.75, metalness:0.05 });
  const metalLegMat = new THREE.MeshStandardMaterial({ color:0x2a2c30, roughness:0.3, metalness:0.85 });
  const handleMat = new THREE.MeshStandardMaterial({ color:0x5a5e64, roughness:0.25, metalness:0.9 });
  const cardboardMat = new THREE.MeshStandardMaterial({ color:0x5a4630, roughness:1, flatShading:true });

  const room = new THREE.Group();
  scene.add(room);

  function box(w,h,d, mat, x,y,z){
    const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
    m.position.set(x,y,z);
    room.add(m);
    return m;
  }

  box(ROOM.w, 0.1, ROOM.d, floorMat, 0, 0, 0);
  box(ROOM.w, 0.1, ROOM.d, ceilMat, 0, ROOM.h, 0);

      if(mesh.material && mesh.material.transparent) return;

  let trashCleanedThisPhase = false; // se reinicia cada fase — limpiar la basura suma selfCare una vez por ciclo

  function applyDegradation(){
    const t = degradation;
    const dim = 1 - t*0.55;
    furnMat.color.setRGB(0.157*dim, 0.157*dim, 0.172*dim);
    wallMat.color.setRGB(0.11*dim, 0.11*dim, 0.12*dim);
    monitorScreenMat.emissiveIntensity = 0.4 * (1 - t*0.6);
    monitorLight.intensity = 0.8 * (1 - t*0.5);
    scene.fog.near = 4 - t*1.5;
    scene.fog.far = 13 - t*4;
    room.children.forEach(mesh=>{
      if(mesh === door) return;
      if(!mesh.userData.basePos) mesh.userData.basePos = mesh.position.clone();
      const jitter = t * 0.015;
      mesh.position.x = mesh.userData.basePos.x + (Math.random()-0.5)*jitter;
      mesh.position.y = mesh.userData.basePos.y + (Math.random()-0.5)*jitter;
    });
  }

  // duración mínima de lectura: ~20 caracteres/seg + 2s de margen antes de ocultarse
  function readingDuration(text){
    const base = Math.max(2500, text.length * 50 + 2000);
    return text.length > 80 ? Math.max(2500, base - 3000) : base; // párrafos largos: 3s menos
  }
  let monologueHideTimer = null;
  function showMonologue(text, ms){
    const finalMs = Math.max(ms || 0, readingDuration(text));
    monologueEl.textContent = text;
    monologueEl.classList.add('show');
    clearTimeout(monologueHideTimer);
    monologueHideTimer = setTimeout(()=> monologueEl.classList.remove('show'), finalMs);
  }

  const TIME_SKIP_TEXT = ['', 'Ha pasado una semana.', 'Ha pasado un mes.', 'Ha pasado un año.', 'Ya perdí la cuenta.'];
  function showTimeSkip(text){

    el.textContent = text;

  const MONOLOGUES = [
    "Suspiras por cualquier cosa. Crees que así será siempre.",

  // ---------- parpadeo de luz (fase "año" en adelante) ----------
  let lightFlickerActive = false;
  function startLightFlicker(){
    if(lightFlickerActive) return;
    lightFlickerActive = true;
    const baseIntensity = edisL1.intensity;
    (function tick(){
      if(!lightFlickerActive) return;
      edisL1.intensity = baseIntensity * (0.3 + Math.random()*0.8);

  // ---------- desorden progresivo del cuarto según la fase ----------
  function applyRoomSetDressing(){
    papersGroup.visible = phaseIndex >= 1;   // semana en adelante: papeles tirados
    bottlesGroup.visible = phaseIndex >= 2;  // mes en adelante: + botellas
    const frameHasFallen = phaseIndex >= 3;  // año en adelante: el cuadro se cae
    anoExtraGroup.visible = frameHasFallen;  // año en adelante: el doble de botellas/papel + envolturas + platos
    frame3.visible = !frameHasFallen;
    photo3.visible = !frameHasFallen;
    fallenFrameGroup.visible = frameHasFallen;
    if(frameHasFallen) startLightFlicker();

  function advancePhase(){
    if(phaseIndex >= PHASES.length - 1) return; // ya en disolución
    TASKS.forEach(t=>{
      taskNeglect[t.id] = t.isDone() ? 0 : Math.min(taskNeglect[t.id] + 1, 4);
    });
    phaseIndex++;
    currentPhase = PHASE_KEYS[phaseIndex];
    bathedThisPhase = false;
    brushedThisPhase = false;
    pillsTakenCountThisPhase = 0;
    trashCleanedThisPhase = false;
    pcCleanUseGrantedThisPhase = false;
    sleptEarlyThisPhase = false;
    setRoomMoodColor('violeta'); // dormir siempre devuelve la luz a la normalidad
    applyRoomSetDressing();
    degradation = Math.min(degradation + 0.22, 0.9);
    if(selfCare > 2) degradation = Math.max(0, degradation - 0.08);
    applyDegradation();
    phaseLabel.textContent = PHASES[phaseIndex];
    stopAmbient();   // pausa el ambiente mientras duerme
    SFX.dormir();
    doHardCutBlack(()=>{
      inBathroom = false;
      camera.position.set(0, 1.6, 1.4);
      yaw = 0; pitch = 0;
      fatigueTimer = 0; // el cansancio ("debo ir a dormir") vuelve a contar ~2 min desde que despiertas
      showTimeSkip(TIME_SKIP_TEXT[phaseIndex]);
      if(phaseIndex < MONOLOGUES.length) showMonologue(MONOLOGUES[phaseIndex-1] || MONOLOGUES[0]);
      // ojos rojos parpadeantes en las paredes — solo en "año"/"disolución", y solo si alguna vez tomaste pastillas
      if(pillsTakenEver && phaseIndex >= 3) triggerWallEyes(4000);
      if(phaseIndex === PHASES.length - 1){
        enterDisolucion();
      } else {
        SFX.habitacion(); // retoma ambiente al despertar
      }
    });
  }

  function doHardCutBlack(after, colorClass=''){
    fadeLayer.className = colorClass;
    fadeLayer.classList.add('show');
    setTimeout(()=>{
      if(after) after();
      setTimeout(()=> fadeLayer.classList.remove('show'), 250);
    }, 650);

  // ---------- fase de disolución: activar cámara ----------
  let webcamActive = false;
  function enterDisolucion(){
    phaseLabel.textContent = 'disolución';
    disolucionDizzyTimer = 0;
    disolucionDizzyNextInterval = randomDizzyInterval(); // primer mareo también llega en un intervalo aleatorio, no de inmediato
    const reflection = document.getElementById('reflection');
    const video = document.getElementById('reflectVideo');
    if(navigator.mediaDevices && navigator.mediaDevices.getUserMedia){
      navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream=>{
          video.srcObject = stream;
          reflection.classList.add('on', 'calm'); // tranquilo por defecto — el glitch solo aparece al disparar un final
          webcamActive = true;
        })
        .catch(()=>{ /* si no hay permiso, la obra continúa sin el reflejo */ });
    }
    SFX.pensamientos(selfCare < 0 ? 3 : 0);
    ensureDisolucionReverb();
    // en disolución aparece la ventana como hotspot interactuable
  }

  // el reflejo de la cámara se distorsiona (glitch) solo ~5s al dispararse un final, no de forma continua
  function triggerCameraGlitchBurst(durationMs=5000){
    if(!webcamActive) return;
    const reflection = document.getElementById('reflection');
    reflection.classList.remove('calm');
    setTimeout(()=> reflection.classList.add('calm'), durationMs);
  }

  // ============================================================
  // FINALES
  // ============================================================
  let endingTriggered = false;

  // ---------- animación de cámara: caída pesada ----------
  function playCameraFallAnimation(callback){
    const startY = camera.position.y;
    const startPitch = pitch;
    const dur = 1300;
    const t0 = performance.now();
    function step(now){
      const t = Math.min((now - t0) / dur, 1);
      const ease = t * t; // acelera como una caída real
      camera.position.y = startY - ease * 0.9;
      pitch = startPitch - ease * 0.9;
      camera.rotation.order = 'YXZ';
      camera.rotation.x = pitch;
      camera.rotation.z = ease * 0.22; // ligero vuelco lateral
      if(t < 1){ requestAnimationFrame(step); }
      else if(callback){ callback(); }
    }
    requestAnimationFrame(step);
  }

  // ---------- espera a que termine la canción antes de pasar a la pantalla final ----------
  // ---------- pantalla final compartida: "gracias por jugar" + título + reiniciar ----------
  function showEndScreen(){
    document.getElementById('endScreen').classList.add('show');

  document.getElementById('btnRestart').addEventListener('click', ()=> window.location.reload());

  function endingSuicidio(){
    if(endingTriggered) return; endingTriggered = true;
    endingSequenceActive = true;
    triggerCameraGlitchBurst();
    document.exitPointerLock();
    showMonologue("El vidrio está frío... Si lo golpeo con suficiente fuerza, el sonido romperá este silencio eterno. Un paso al frente. Un segundo flotando... en el vacío. Caída libre. Corte.", 7000);

    setTimeout(()=>{
      playCameraFallAnimation(()=>{
        SFX.caida();
        doHardCutBlack(()=>{
          // "pensamientos" queda sonando de fondo, pero la pantalla final aparece pronto — no se espera a que termine la canción
          stopAll();
          AUDIO.pensamientos.loop = true;
          AUDIO.pensamientos.playbackRate = 1.0;
          AUDIO.pensamientos.volume = 0.85;
          AUDIO.pensamientos.currentTime = 0;
          AUDIO.pensamientos.play().catch(()=>{});
          currentAmbient = AUDIO.pensamientos;
          setTimeout(showEndScreen, 2500); // un momento en negro antes de la pantalla final, igual que en el final de Salida
        });
      });
    }, 7000); // deja ~7s para leer el diálogo previo antes de caer
  }

  function endingDormirSiempre(){
    if(endingTriggered) return; endingTriggered = true;
    endingSequenceActive = true; // controles bloqueados de forma permanente
    triggerCameraGlitchBurst();
    document.exitPointerLock();
    stopAll();
    // nana/lullaby: no existe un archivo dedicado en Musica/ todavía —
    // se reutiliza 'dormir.wav' en loop como placeholder temático (ver nota al usuario)
    AUDIO.dormir.loop = true;
    AUDIO.dormir.volume = 0.5;

  }

  function endingSalida(){
    if(endingTriggered) return; endingTriggered = true;

    triggerCameraGlitchBurst();
    showMonologue("Mi mano tiembla en la perilla... Hace tanto tiempo que no toco metal frío que no sea el de mi teclado. Un paso. El umbral se desvanece. La luz blanca me ciega... Por fin... libre.", 7000);

  let currentHotspot = null;

  function updateHotspot(){
    if(anyPanelOpen()){ interactPrompt.style.display='none'; currentHotspot=null; return; }
    const currentRoom = inBathroom ? 'bath' : 'main';
    let nearest = null, nearestDist = Infinity;
    for(const h of HOTSPOTS){
      if(h.room && h.room !== currentRoom) continue;
      const dx = camera.position.x - h.x, dz = camera.position.z - h.z;
      const dist = Math.hypot(dx,dz);
      if(dist < h.r && dist < nearestDist){ nearest = h; nearestDist = dist; }
    }
    // ventana solo en disolución y en el cuarto principal
    if(!inBathroom && phaseIndex === PHASES.length-1){
      const dx = camera.position.x - 0.15, dz = camera.position.z - (-2.4);
      const dist = Math.hypot(dx,dz);
      if(dist < 1.1 && dist < nearestDist){ nearest = { name:'window', label:'[E] la ventana' }; nearestDist = dist; }
    }
    // basura tirada: solo si hay algo que limpiar y aún no se limpió en este ciclo
    if(!inBathroom && phaseIndex >= 1 && !trashCleanedThisPhase){
      const dx = camera.position.x - 0.3, dz = camera.position.z - (-1.0);
      const dist = Math.hypot(dx,dz);
      if(dist < 1.3 && dist < nearestDist){ nearest = { name:'trash', label:'[E] limpiar la basura' }; nearestDist = dist; }
    }
    currentHotspot = nearest;
    if(nearest){ interactPrompt.textContent = nearest.label; interactPrompt.style.display='block'; }
    else interactPrompt.style.display='none';
  }

  let bedSeqLineIndex = 0;
  let bedSeqTyping = false;
  let bedSeqFinished = false;
  let bedSeqTypeTimer = null;
  let pensamientosFilter = null, pensamientosSource = null;

  function ensurePensamientosFilter(){
    if(pensamientosFilter) return;
    const ctx = ac();
    pensamientosSource = ctx.createMediaElementSource(AUDIO.pensamientos);
    pensamientosFilter = ctx.createBiquadFilter();
    pensamientosFilter.type = 'lowpass';
    pensamientosFilter.frequency.value = 20000; // sin filtrar por defecto
    pensamientosSource.connect(pensamientosFilter);
    pensamientosFilter.connect(ctx.destination);
  }

  // ---------- reverb ligero sobre "pensamientos" (el ambiente real en disolución), solo al quedarte quieto ----------
  // reutiliza pensamientosSource/pensamientosFilter ya creados por ensurePensamientosFilter() —
  // un <audio> solo admite un único createMediaElementSource en toda su vida
  let disolucionReverbWet = null, disolucionReverbDelay = null, disolucionReverbFeedback = null;
  function ensureDisolucionReverb(){
    if(disolucionReverbWet) return;
    ensurePensamientosFilter(); // garantiza que pensamientosFilter ya exista y esté conectado
    const ctx = ac();
    disolucionReverbWet = ctx.createGain(); disolucionReverbWet.gain.value = 0; // arranca seco
    disolucionReverbDelay = ctx.createDelay(1.0); disolucionReverbDelay.delayTime.value = 0.24;
    disolucionReverbFeedback = ctx.createGain(); disolucionReverbFeedback.gain.value = 0.4;
    pensamientosFilter.connect(disolucionReverbDelay); // toma la señal ya filtrada, en paralelo a su salida seca existente
    disolucionReverbDelay.connect(disolucionReverbFeedback);
    disolucionReverbFeedback.connect(disolucionReverbDelay);
    disolucionReverbDelay.connect(disolucionReverbWet);
    disolucionReverbWet.connect(ctx.destination);
  }
  function setDisolucionReverbWet(v){
    if(!disolucionReverbWet) return;
    disolucionReverbWet.gain.setTargetAtTime(v, ac().currentTime, 0.4);
  }

  function onBed(){
    if(phaseIndex === PHASES.length - 1){
      endingDormirSiempre();
    } else {
      startBedMemorySequence();
    }
  }

  function startBedMemorySequence(){
    bedSeqActive = true;
    bedSeqFinished = false;
    bedSeqLineIndex = 0;
    document.exitPointerLock();
    pitch = -0.65; // cámara mira hacia arriba, acostado
    interactPrompt.style.display = 'none'; // oculta el "[E] dormir" de fondo mientras dura la secuencia

    stopAll();
    ensurePensamientosFilter();
    const ctx = ac();
    if(ctx.state === 'suspended') ctx.resume();
    pensamientosFilter.frequency.setTargetAtTime(340, ctx.currentTime, 0.6); // low-pass: música muffled/distorsionada
    AUDIO.pensamientos.playbackRate = 0.92;
    AUDIO.pensamientos.loop = true;
    AUDIO.pensamientos.volume = 0.42;
    AUDIO.pensamientos.currentTime = 0;
    AUDIO.pensamientos.play().catch(()=>{});
    currentAmbient = AUDIO.pensamientos;

    document.getElementById('bedFade').classList.add('show');
    const hint = document.getElementById('bedDialogueHint');
    hint.textContent = 'click o [espacio] para continuar';
    hint.classList.remove('wake');
    document.getElementById('bedDialogueBox').classList.add('show');
    document.getElementById('bedDialogueText').textContent = '';

    setTimeout(showBedLine, 900); // deja sentir el fade antes de la primera línea
  }

  function showBedLine(){
    const lines = BED_MEMORY_LINES[Math.min(phaseIndex, BED_MEMORY_LINES.length - 1)];
    if(bedSeqLineIndex >= lines.length){
      finishBedLines();
      return;
    }
    typeBedLine(lines[bedSeqLineIndex]);
  }

  function typeBedLine(text){
    const el = document.getElementById('bedDialogueText');
    el.textContent = '';
    bedSeqTyping = true;
    let i = 0;
    clearInterval(bedSeqTypeTimer);
    bedSeqTypeTimer = setInterval(()=>{
      i++;
      el.textContent = text.slice(0, i);
      if(i >= text.length){
        clearInterval(bedSeqTypeTimer);
        bedSeqTyping = false;
      }
    }, 26);
  }

  // ---------- post-it de tareas: lista que se deteriora con el olvido ----------
  function taskCharHash(seed, i){
    let h = 0;
    for(let k=0;k<seed.length;k++) h = (h*31 + seed.charCodeAt(k) + i*7) | 0;
    return Math.abs(h);
  }
  function redactText(text, seed){
    return [...text].map((ch,i)=>{
      if(ch === ' ') return ch;
      return (taskCharHash(seed, i) % 5 === 0) ? ' ' : ch;
    }).join('');
  }
  function taskState(t){
    if(t.isDone()) return 'done';
    const n = taskNeglect[t.id];
    if(n <= 0) return 'pending';
    if(n === 1) return 'faded';
    if(n === 2) return 'redacted';
    if(n === 3) return 'hidden';
    return 'forgotten';
  }
  function renderTasksPanel(){
    const rows = TASKS.map(t=>{
      const state = taskState(t);
      if(state === 'hidden') return '';
      let label = t.label;
      if(state === 'forgotten') label = 'He olvidado qué tenía que hacer...';
      else if(state === 'redacted') label = redactText(t.label, t.id);
      const mark = state === 'done' ? '✔' : (state === 'forgotten' ? '·' : '☐');
      const clickable = t.manual && state !== 'done' && state !== 'forgotten';
      return `<div class="task-row state-${state}"${clickable ? ` data-task="${t.id}" style="cursor:pointer"` : ''}><span class="task-check">${mark}</span><span>${label}</span></div>`;
    }).join('');
    const content = document.getElementById('tasksContent');

  let postItFlickerMul = 1;
  (function tickPostItFlicker(){
    postItFlickerMul = Math.random() < 0.12 ? (0.3 + Math.random()*0.35) : 1;
    setTimeout(tickPostItFlicker, 120 + Math.random()*260);

  function updatePostItGlow(now){
    const pulse = 0.35 + Math.sin(now * 0.0018) * 0.18;
    postItMat.emissiveIntensity = pulse * postItFlickerMul;
  }

  // ---------- la puerta como indicador del estado mental: brillo verde sutil y gradual ----------
  function updateDoorGlow(dt){
    const doneCount = TASKS.filter(t=>t.isDone()).length;
    const selfCareNorm = Math.max(0, Math.min(1, selfCare / 5));
    const taskNorm = doneCount / TASKS.length;
    const target = Math.max(0, Math.min(1, 0.5*selfCareNorm + 0.5*taskNorm));
    const step = dt * 0.06; // avance lento, nunca abrupto
    if(doorGlowCurrent < target) doorGlowCurrent = Math.min(target, doorGlowCurrent + step);
    else if(doorGlowCurrent > target) doorGlowCurrent = Math.max(target, doorGlowCurrent - step);
    doorMat.color.lerpColors(doorColdColor, doorHopeColor, doorGlowCurrent);
    doorMat.emissive.lerpColors(doorColdEmissive, doorHopeEmissive, doorGlowCurrent);
    doorMat.emissiveIntensity = 0.3 + doorGlowCurrent * 0.35;
  }

  let lastThoughtText = null;
  function pickThought(){
    const decline = Math.max(0, Math.min(1, degradation));
    const repeatChance = 0.1 + decline*0.45;
    if(lastThoughtText && Math.random() < repeatChance) return lastThoughtText;
    const wantConfused = Math.random() < (0.25 + decline*0.55);
    const pool = THOUGHTS.filter(t => t.confused === wantConfused);
    const choice = pool[Math.floor(Math.random()*pool.length)].text;
    lastThoughtText = choice;
    return choice;
  }
  function scheduleNextThought(){
    const decline = Math.max(0, Math.min(1, degradation));
    const base = 42000 - decline*28000; // de ~42s a ~14s conforme empeora la memoria
    const jitter = 8000 + Math.random()*14000;
    setTimeout(()=>{
      if(!anyPanelOpen()) showMonologue(pickThought());
      scheduleNextThought();
    }, base + jitter);
  }

  function fakeTimestamp(seed){
    const days = ['dom','lun','mar','mié','jue','vie','sáb'];
    const h = (seed*7)%24, m=(seed*13)%60, s=(seed*31)%60;
    const dd = 10+(seed%18), mm = 1+(seed%12);
    return `${String(dd).padStart(2,'0')}/${String(mm).padStart(2,'0')}(${days[seed%7]})${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }

      if(esc.startsWith('&gt;')) return `<span class="greentext">${esc}</span>`;
      return esc;
    }).join('<br>');
  }

  ];

  function renderRPG(){
    if(activeMinigameCleanup){ activeMinigameCleanup(); activeMinigameCleanup = null; }
    const phase = RPG_LINES_BY_PHASE[Math.min(phaseIndex, RPG_LINES_BY_PHASE.length-1)];
    pcContent.innerHTML = `
      <div class="rpg-box">
        <canvas id="rpgCanvas" width="400" height="170"></canvas>
        <div class="rpg-hint" id="rpgHint">flechas para moverte</div>
        <div class="rpg-dialogue" id="rpgDialogue">Te acercas al claro del bosque.</div>
        <div class="rpg-choices" id="rpgChoices"></div>
      </div>`;
    const cv = document.getElementById('rpgCanvas');
    const ctx = cv.getContext('2d');
    const dlg = document.getElementById('rpgDialogue');
    const hint = document.getElementById('rpgHint');
    const choicesEl = document.getElementById('rpgChoices');

    const POIS = [
      { key:'npc',  x:200, y:80,  r:16, label:'viajero', color:'#8f8f96' },
      { key:'tree', x:60,  y:55,  r:14, label:'árbol',   color:'#4a6a3a' },
      { key:'well', x:335, y:105, r:14, label:'pozo',    color:'#3a3a44' },
    ];
    const player = { x:200, y:150 };
    const speed = 2.6;
    const pk = {};
    let treeIdx = 0, wellIdx = 0, branchTaken = false, rpgRAF = null;

    function kd(e){ pk[e.key]=true; }
    function ku(e){ pk[e.key]=false; }
    window.addEventListener('keydown', kd);
    window.addEventListener('keyup', ku);

    function nearestPOI(){
      let n=null, nd=Infinity;
      for(const p of POIS){
        const d = Math.hypot(player.x-p.x, player.y-p.y);
        if(d < p.r+14 && d<nd){ n=p; nd=d; }
      }
      return n;
    }

    function showChoices(){
      if(branchTaken || !phase.branches){ choicesEl.innerHTML=''; return; }
      choicesEl.innerHTML = phase.branches.map((b,i)=>`<button data-i="${i}">${b.choice}</button>`).join('');
      choicesEl.querySelectorAll('button').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          const b = phase.branches[+btn.dataset.i];
          dlg.textContent = b.reply;
          branchTaken = true;
          SFX.teclado();
          choicesEl.innerHTML = '';
          setTimeout(()=>{ dlg.textContent = phase.closing; }, 2200);
        });
      });
    }

    function interact(poi){
      SFX.teclado();
      if(poi.key === 'npc'){
        if(!branchTaken){ dlg.textContent = phase.greeting; showChoices(); }
        else { dlg.textContent = phase.closing; }
      } else if(poi.key === 'tree'){
        dlg.textContent = phase.tree[treeIdx % phase.tree.length]; treeIdx++;
        choicesEl.innerHTML = '';
      } else if(poi.key === 'well'){
        dlg.textContent = phase.well[wellIdx % phase.well.length]; wellIdx++;
        choicesEl.innerHTML = '';
      }
    }

    function onKeyE(e){
      if(e.key.toLowerCase() === 'e'){
        const near = nearestPOI();
        if(near) interact(near);
      }
    }
    window.addEventListener('keydown', onKeyE);

    let lastNear = null;
    function loop(){
      let mx=0, my=0;
      if(pk['ArrowLeft']) mx-=1;
      if(pk['ArrowRight']) mx+=1;
      if(pk['ArrowUp']) my-=1;
      if(pk['ArrowDown']) my+=1;
      if(mx||my){
        const len = Math.hypot(mx,my);
        player.x += mx/len*speed; player.y += my/len*speed;
        player.x = Math.max(14, Math.min(386, player.x));
        player.y = Math.max(14, Math.min(156, player.y));
      }
      const near = nearestPOI();
      if(near !== lastNear){
        hint.textContent = near ? `[E] hablar/mirar — ${near.label}` : 'flechas para moverte';
        lastNear = near;
      }

      ctx.clearRect(0,0,400,170);
      ctx.fillStyle = '#111013'; ctx.fillRect(0,0,400,170);
      ctx.fillStyle = '#1c1c1f'; ctx.fillRect(0,140,400,30);
      POIS.forEach(p=>{ ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); });
      ctx.fillStyle = near ? '#c9c9cf' : '#8f8f96';
      ctx.fillRect(player.x-6, player.y-6, 12, 12);

      rpgRAF = requestAnimationFrame(loop);
    }
    loop();

    activeMinigameCleanup = ()=>{
      window.removeEventListener('keydown', kd);
      window.removeEventListener('keyup', ku);
      window.removeEventListener('keydown', onKeyE);
      if(rpgRAF) cancelAnimationFrame(rpgRAF);
    };
  }

  // ---------- plataformas (minijuego jugable) ----------
  let platDeaths = 0;
  const PLAT_LAYOUTS = [
    [ {x:140,w:40}, {x:260,w:50} ],
    [ {x:100,w:35}, {x:220,w:45}, {x:340,w:35} ],
    [ {x:160,w:60} ],
    [ {x:90,w:30}, {x:180,w:30}, {x:300,w:60} ],
  ];
  function renderPlataformas(){
    if(activeMinigameCleanup){ activeMinigameCleanup(); activeMinigameCleanup = null; }
    pcContent.innerHTML = `
      <canvas id="platCanvas" width="480" height="220"></canvas>
      <div class="plat-hint">flechas para moverte · espacio para saltar · llega a la meta · <span id="platDeaths">muertes: ${platDeaths}</span></div>
      <div id="platRetryWrap" style="text-align:center;margin-top:8px;"></div>
    `;
    const cv = document.getElementById('platCanvas');
    const ctx = cv.getContext('2d');
    const groundY = 180;
    const jumpV = -7.4 + Math.min(phaseIndex*0.35, 1.4);          // salto más débil en fases avanzadas
    const degradedSpeed = Math.max(2.3, 4.5 - phaseIndex*0.35);
    const inputLagFrames = Math.min(phaseIndex*2, 6);              // inputs "menos responsivos" en fases avanzadas
    const layout = PLAT_LAYOUTS[(Math.random()*PLAT_LAYOUTS.length)|0];
    const player = { x:20, y:groundY-16, w:14, h:16, vy:0, onGround:true, flash:0 };
    const goal = { x:440, y:groundY-20, w:14, h:20 };
    let done = false, fell = false, finished = false, platRAF = null;
    const pk = {};
    const inputHistory = [];
    const particles = [];

    function spawnBurst(x,y,color,n=8){
      for(let i=0;i<n;i++){
        const a = Math.random()*Math.PI*2;
        particles.push({ x, y, vx:Math.cos(a)*(1+Math.random()*2), vy:Math.sin(a)*(1+Math.random()*2)-1, life:1, color });
      }
    }

    function kd(e){ pk[e.key]=true; if(e.key===' ') e.preventDefault(); }
    function ku(e){ pk[e.key]=false; }
    window.addEventListener('keydown', kd);
    window.addEventListener('keyup', ku);

    function finish(){
      ctx.fillStyle = 'rgba(5,5,6,0.72)'; ctx.fillRect(0,0,480,220);
      ctx.fillStyle = '#c9c9cf'; ctx.font = '12px monospace'; ctx.textAlign = 'center';
      ctx.fillText(fell ? 'no llegaste — inténtalo de nuevo' : 'completado', 240, 105);
      ctx.textAlign = 'left';
      const dEl = document.getElementById('platDeaths');
      if(dEl) dEl.textContent = `muertes: ${platDeaths}`;
      const retryWrap = document.getElementById('platRetryWrap');
      if(retryWrap){
        retryWrap.innerHTML = `<button id="platRetry">reintentar</button>`;
        document.getElementById('platRetry').addEventListener('click', renderPlataformas);
      }
    }

    let frame = 0;
    function loop(){
      frame++;
      inputHistory.push({ right: !!pk['ArrowRight'], left: !!pk['ArrowLeft'], jump: !!pk[' '] });
      const readIdx = Math.max(0, inputHistory.length-1-inputLagFrames);
      const input = inputHistory[readIdx] || {right:false,left:false,jump:false};

      if(!done){
        if(input.right) player.x += degradedSpeed;
        if(input.left) player.x -= degradedSpeed;
        if(input.jump && player.onGround){
          player.vy = jumpV; player.onGround = false;
          spawnBurst(player.x+player.w/2, player.y+player.h, '#8f8f96', 6);
          SFX.pasos();
        }
        player.vy += 0.35;
        player.y += player.vy;

        const overGap = layout.some(g => player.x+player.w > g.x && player.x < g.x+g.w);
        const wasFalling = !player.onGround;
        if(player.y >= groundY-16 && !overGap){
          if(wasFalling && player.vy > 2) spawnBurst(player.x+player.w/2, groundY, '#c9c9cf', 5);
          player.y = groundY-16; player.vy = 0; player.onGround = true;
        }
        if(player.y > 240){
          fell = true; done = true; platDeaths++;
          spawnBurst(player.x+player.w/2, 200, '#8a2a2a', 14);
          player.flash = 1;
        }
        if(player.x+player.w > goal.x){ done = true; spawnBurst(goal.x, goal.y+10, '#c9c9cf', 14); }
      }

      particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.life-=0.03; });
      for(let i=particles.length-1;i>=0;i--) if(particles[i].life<=0) particles.splice(i,1);
      if(player.flash>0) player.flash -= 0.05;

      ctx.clearRect(0,0,480,220);
      ctx.fillStyle = '#131315'; ctx.fillRect(0,0,480,220);
      ctx.fillStyle = '#28282c';
      let lastX = 0;
      layout.forEach(g=>{ ctx.fillRect(lastX, groundY, g.x-lastX, 40); lastX = g.x+g.w; });
      ctx.fillRect(lastX, groundY, 480-lastX, 40);

      ctx.fillStyle = '#c9c9cf'; ctx.fillRect(goal.x, goal.y, goal.w, goal.h);

      // sprite: cabeza + torso + piernas alternadas (2 frames de "correr")
      const runFrame = Math.floor(frame/8)%2;
      ctx.fillStyle = player.flash>0 ? `rgba(200,60,60,${0.4+player.flash*0.6})` : '#8f8f96';
      ctx.beginPath(); ctx.arc(player.x+7, player.y+3, 3.4, 0, Math.PI*2); ctx.fill();
      ctx.fillRect(player.x+3, player.y+6, 8, 7);
      if(player.onGround && (input.left||input.right)){
        if(runFrame===0){ ctx.fillRect(player.x+2, player.y+13, 3, 4); ctx.fillRect(player.x+9, player.y+13, 3, 3); }
        else { ctx.fillRect(player.x+2, player.y+13, 3, 3); ctx.fillRect(player.x+9, player.y+13, 3, 4); }
      } else {
        ctx.fillRect(player.x+3, player.y+13, 3, 4);
        ctx.fillRect(player.x+8, player.y+13, 3, 4);
      }

      particles.forEach(p=>{
        ctx.globalAlpha = Math.max(0,p.life);
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x-1.5, p.y-1.5, 3, 3);
      });
      ctx.globalAlpha = 1;

      if(!finished){
        if(done && particles.length===0){
          finished = true;
          finish();
          return;
        }
        platRAF = requestAnimationFrame(loop);
      }
    }
    loop();

    activeMinigameCleanup = ()=>{
      window.removeEventListener('keydown', kd);
      window.removeEventListener('keyup', ku);
      if(platRAF){ cancelAnimationFrame(platRAF); platRAF=null; }
    };
  }

  // ============================================================
  // render loop
  // ============================================================
  let lastT = performance.now();
  function animate(){
    requestAnimationFrame(animate);
    const now = performance.now();
    const dt = Math.min((now-lastT)/1000, 0.05);
    lastT = now;

    updateDoorGlow(dt);
    updatePostItGlow(now);

    if(currentPhase === 'disolucion'){
      disolucionDizzyTimer += dt;
      if(disolucionDizzyTimer >= disolucionDizzyNextInterval && !anyPanelOpen()){
        triggerDisolucionDizzy();
      }
    } else {
      fatigueTimer += dt;
      if(fatigueTimer >= FATIGUE_INTERVAL && !anyPanelOpen()){
        triggerFatigueEvent();
      }
    }

    if(!anyPanelOpen()){
      camera.rotation.order = 'YXZ';
      camera.rotation.y = yaw;
      camera.rotation.x = pitch;

      let mx=0, mz=0;
      if(keys['w']) mz -= 1;
      if(keys['s']) mz += 1;
      if(keys['a']) mx -= 1;
      if(keys['d']) mx += 1;
      if(mx||mz){
        const len = Math.hypot(mx,mz);
        mx/=len; mz/=len;
        const forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
        const right = new THREE.Vector3(Math.sin(yaw+Math.PI/2), 0, Math.cos(yaw+Math.PI/2));
        const move = new THREE.Vector3()
          .addScaledVector(forward, mz)
          .addScaledVector(right, mx)
          .multiplyScalar(PLAYER_SPEED*dt);
        camera.position.add(move);
        footstepTimer += dt;
        if(footstepTimer >= FOOTSTEP_INTERVAL){
          footstepTimer = 0;
          SFX.pasos();
        }
      } else {
        footstepTimer = FOOTSTEP_INTERVAL; // al retomar el movimiento, el primer paso suena casi de inmediato
      }
      if(inBathroom){
        camera.position.x = Math.max(BX - BATH.w/2 + 0.35, Math.min(BX + BATH.w/2 - 0.35, camera.position.x));
        camera.position.z = Math.max(BZ - BATH.d/2 + 0.35, Math.min(BZ + BATH.d/2 - 0.35, camera.position.z));
      } else {
        camera.position.x = Math.max(-BOUND.x, Math.min(BOUND.x, camera.position.x));
        camera.position.z = Math.max(-BOUND.z, Math.min(BOUND.z, camera.position.z));
      }

      // temblor de cámara (sobredosis de pastillas)
      if(now < cameraShakeUntil){
        const mag = 0.02;
        camera.position.x += (Math.random()-0.5)*mag;
        camera.position.y += (Math.random()-0.5)*mag;
        camera.rotation.z = (Math.random()-0.5)*0.04;
      } else if(camera.rotation.z !== 0){
        camera.rotation.z = 0;
      }

      // disolución: al quedarte quieto, un pequeño blur + reverb; se quita en cuanto te mueves
      if(currentPhase === 'disolucion' && !inBathroom){
        if(mx || mz){
          disolucionStillTimer = 0;
          if(disolucionBlurActive){
            disolucionBlurActive = false;
            canvas.classList.remove('blurred-soft');
            setDisolucionReverbWet(0);
          }
        } else {
          disolucionStillTimer += dt;
          if(disolucionStillTimer > 0.6 && !disolucionBlurActive){
            disolucionBlurActive = true;
            canvas.classList.add('blurred-soft');
            setDisolucionReverbWet(0.35);
          }
        }
      }

      updateHotspot();
      if(!inBathroom) checkDoorProximity();
    }

    if(composer) composer.render(); else renderer.render(scene, camera);
  }
  animate();
})();
</script>
